<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Endless Saga — Battle Square</title>
<meta name="description" content="A Final Fantasy VII Gold Saucer–inspired roguelike battle arena. Survive eight battles, spin the handicap reels, and choose how to beat the curse. HD-2D, single-file, playable in your browser.">
<meta name="theme-color" content="#ff46c8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Endless Saga">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<!-- Open Graph / social preview -->
<meta property="og:type" content="website">
<meta property="og:title" content="Endless Saga — Battle Square">
<meta property="og:description" content="An FF7 Gold Saucer–style roguelike arena. Spin the handicap reels, choose your gamble, and see how far you can go.">
<meta property="og:image" content="preview.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#ffd23a; --gold-dim:#e0a020; --ink:#2b1d38;
    --panel:#3b2a52; --panel-2:#503a6e; --panel-lo:#241634;
    --hp:#5fd943; --hp-hi:#a8f57a; --mp:#4aa8ff; --mp-hi:#a0d8ff;
    --pink:#ff46c8; --cyan:#5cf0ff;
    --stroke:#1d1329;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#05060a;
       width:100%;height:100%;height:100dvh;
       overflow:hidden;overscroll-behavior:none;
       position:fixed;inset:0;
       touch-action:manipulation;-webkit-text-size-adjust:100%;}
  body{display:flex;align-items:center;justify-content:center;
       font-family:'Nunito',system-ui,sans-serif;font-weight:800;color:#fff6e8;}
  /* NOTE: viewport units lie on mobile Safari (dvh can exceed what you can
     actually see in landscape), which pushed the command bar off-screen.
     fitGame() below sets the real pixel size from window.visualViewport. */
  #game{position:relative;aspect-ratio:16/9;
        width:min(100vw,calc(100vh*16/9));
        box-shadow:0 0 80px rgba(0,0,0,.9);}
  #cv{position:absolute;inset:0;width:100%;height:100%;}

  /* ---------- HD2D panels ---------- */
  .panel{background:linear-gradient(180deg,var(--panel-2),var(--panel));
         border:4px solid var(--stroke);border-radius:16px;position:relative;
         box-shadow:0 6px 0 var(--stroke), 0 10px 24px rgba(0,0,0,.55),
                    inset 0 3px 0 rgba(255,255,255,.16);}

  #cmdwin{position:absolute;left:2.2%;bottom:2.6%;width:24%;min-height:19%;max-height:40%;overflow:hidden;padding:1.1% 1.3%;z-index:12;}
  #statwin{position:absolute;right:2.2%;bottom:2.6%;width:27.5%;padding:1% 1.5%;z-index:11;}
  #msg{position:absolute;top:3.5%;left:50%;transform:translateX(-50%);max-width:70%;
       padding:.7% 2.4%;text-align:center;font-size:clamp(13px,2.5vmin,22px);
       letter-spacing:.06em;white-space:nowrap;}
  #msg.hidden{display:none;}

  /* ---- (20) phones: the commands become a wide, chunky thumb bar across the
       bottom, with targets big enough to hit without looking ---- */
  @media (max-width:820px), (pointer:coarse){
    #cmdwin{left:2%;right:2%;width:auto;bottom:2%;
            min-height:0;max-height:none;padding:1.4% 1.6%;}
    #cmdwin.grid{display:grid;grid-template-columns:1fr 1fr;gap:2%;}
    /* the status strip goes ABOVE the thumb bar. Its exact offset is measured in
       JS (--cmdh) because the command bar's height changes with the menu. */
    #statwin{right:2%;left:2%;width:auto;top:auto;
            bottom:calc(2.5% + var(--cmdh,16vmin));padding:.5% 2% .7%;
            border-width:3px;border-radius:12px;
            transition:bottom .12s;}
    /* on a phone this is a slim strip, not a panel */
    #statwin .srow{margin:.35% 0;gap:2%;}
    #statwin .bar{height:7px;border-width:2px;border-radius:5px;margin:0 2%;}
    #statwin .bar i::after{inset:0 0 50% 0;}
    #pname{font-size:clamp(11px,2.9vw,15px);}
    #statwin .lbl{font-size:clamp(8px,2.2vw,11px);width:8%;}
    #statwin .val{font-size:clamp(8px,2.2vw,11px);}
    #statwin .tiny{font-size:clamp(8px,2.1vw,11px);}
    .cmd{margin:0;padding:3.2% 3% 3.2% 11%;
         font-size:clamp(14px,4vw,20px);border-radius:12px;
         min-height:9.5vmin;display:flex;align-items:center;
         background:linear-gradient(180deg,#6a4a96,#472f6e);
         border:3px solid var(--stroke);
         box-shadow:0 4px 0 var(--stroke),inset 0 2px 0 rgba(255,255,255,.18);}
    .cmd.sel{box-shadow:0 4px 0 var(--stroke),0 0 14px rgba(255,210,60,.6),
             inset 0 2px 0 rgba(255,255,255,.35);}
    .cmd.sel::before{left:4%;border-left-width:10px;
             border-top-width:7px;border-bottom-width:7px;}
    .cmd .cost,.cmd .cnt{font-size:.75em;}
    .reels{width:88%;}
    .wagers{gap:1.6%;}
  }
  .cmd{display:block;width:100%;text-align:left;background:rgba(0,0,0,.18);
       border:0;border-radius:9px;color:#fff2dc;
       font-family:'Baloo 2',cursive;font-weight:700;font-size:clamp(13px,2.4vmin,21px);letter-spacing:.03em;
       padding:2.4% 3% 2.4% 11%;margin:2.5% 0;cursor:pointer;position:relative;line-height:1.2;
       transition:transform .1s,background .12s;
       text-shadow:0 2px 0 rgba(0,0,0,.45);}
  .cmd .cost{float:right;color:var(--mp-hi);font-size:.82em;}
  .cmd .cnt{float:right;color:var(--gold);font-size:.82em;}
  .cmd.sel{background:linear-gradient(180deg,var(--gold),var(--gold-dim));color:#3a2400;
       text-shadow:0 1px 0 rgba(255,255,255,.45);transform:translateX(3px);}
  .cmd.sel .cost,.cmd.sel .cnt{color:#5a3a00;}
  .cmd.sel::before{content:"";position:absolute;left:3.5%;top:50%;
       width:0;height:0;border-left:9px solid #3a2400;
       border-top:6px solid transparent;border-bottom:6px solid transparent;
       transform:translateY(-50%);animation:pulse 1s ease-in-out infinite;}
  .cmd.dis{color:#8d84a0;opacity:.55;}
  @keyframes pulse{50%{opacity:.4;}}

  .srow{display:flex;justify-content:space-between;align-items:baseline;margin:1.2% 0;}
  #pname{font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(15px,2.8vmin,25px);
       color:#fff;letter-spacing:.04em;text-shadow:0 2px 0 var(--stroke),0 0 10px rgba(255,210,60,.5);}
  .lbl{font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(11px,1.9vmin,16px);
       color:#fff;letter-spacing:.06em;width:13%;text-shadow:0 2px 0 var(--stroke);}
  .tiny{font-size:clamp(11px,1.8vmin,15px);color:#d6c9ea;letter-spacing:.02em;font-weight:700;}
  .bar{height:14px;flex:1;background:#150d20;border:3px solid var(--stroke);
       border-radius:8px;overflow:hidden;margin:0 2.5%;
       box-shadow:inset 0 2px 5px rgba(0,0,0,.7);}
  .bar i{display:block;height:100%;transition:width .3s;border-radius:4px;position:relative;}
  .bar i::after{content:"";position:absolute;inset:0 0 55% 0;background:rgba(255,255,255,.35);border-radius:4px 4px 0 0;}
  #hpbar i{background:linear-gradient(180deg,var(--hp-hi),var(--hp) 55%,#2f8f27);}
  #mpbar i{background:linear-gradient(180deg,var(--mp-hi),var(--mp) 55%,#1d5fb0);}
  #lbbar i{background:linear-gradient(180deg,#ffe6a0,var(--gold) 50%,#d07a10);}
  #lbbar.full{animation:lbpulse .8s ease-in-out infinite;}
  #lbbar.full i{background:linear-gradient(90deg,#fff2b0,#ffd23a,#ff8ad0,#ffd23a);background-size:250% 100%;animation:lbshift 1.2s linear infinite;}
  @keyframes lbshift{to{background-position:250% 0;}}
  @keyframes lbpulse{50%{box-shadow:0 0 14px rgba(255,210,60,.9);}}
  .val{font-size:clamp(11px,1.9vmin,16px);color:#d8d2c2;min-width:20%;text-align:right;font-variant-numeric:tabular-nums;}

  /* ---------- overlays ---------- */
  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;
           background:radial-gradient(ellipse at 50% 45%,rgba(8,10,18,.35),rgba(3,4,8,.88) 85%);}
  #overlay.hidden{display:none;}
  .sheet{width:78%;padding:2.5% 3%;text-align:center;overflow:hidden;
       transform-origin:center center;will-change:transform;}
  .title-big{font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(28px,8vmin,68px);
       letter-spacing:.04em;color:var(--gold);margin:1% 0;line-height:1.05;
       -webkit-text-stroke:5px var(--stroke);paint-order:stroke fill;
       text-shadow:0 6px 0 var(--stroke),0 0 26px rgba(255,210,60,.5);}
  .rule{width:56%;height:5px;margin:2% auto;border:0;border-radius:3px;
        background:linear-gradient(90deg,transparent,var(--pink),var(--cyan),transparent);}
  .subtitle{font-size:clamp(13px,2.3vmin,20px);color:#d8cbe8;letter-spacing:.02em;line-height:1.7;font-weight:700;}
  .mbtn{display:block;margin:2.4% auto;padding:1.6% 4%;min-width:46%;
        background:linear-gradient(180deg,#6a4a96,#472f6e);
        border:4px solid var(--stroke);border-radius:14px;color:#fff;
        font-family:'Baloo 2',cursive;font-weight:700;
        font-size:clamp(15px,2.8vmin,24px);letter-spacing:.04em;cursor:pointer;
        box-shadow:0 5px 0 var(--stroke),0 8px 14px rgba(0,0,0,.45),inset 0 3px 0 rgba(255,255,255,.2);
        text-shadow:0 2px 0 rgba(0,0,0,.5);transition:transform .1s,box-shadow .1s,filter .12s;}
  .mbtn:hover,.mbtn:focus-visible{outline:none;filter:brightness(1.15);
        transform:translateY(-2px);box-shadow:0 7px 0 var(--stroke),0 12px 20px rgba(0,0,0,.5),inset 0 3px 0 rgba(255,255,255,.25);}
  .mbtn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--stroke),inset 0 3px 0 rgba(255,255,255,.15);}
  .cards{display:flex;gap:2.2%;justify-content:center;margin-top:2.5%;align-items:stretch;}
  .card{flex:1;max-width:31%;padding:2.6% 1.8% 3%;cursor:pointer;color:#e6dcf4;
        background:linear-gradient(180deg,#5a4180,#3a2757);
        border:4px solid var(--stroke);border-radius:14px;font-family:inherit;font-weight:700;
        font-size:clamp(12px,2vmin,17px);line-height:1.5;
        box-shadow:0 5px 0 var(--stroke),0 8px 16px rgba(0,0,0,.45),inset 0 3px 0 rgba(255,255,255,.14);
        transition:transform .14s,box-shadow .14s,filter .14s;position:relative;}
  .card:hover,.card:focus-visible{transform:translateY(-4px);outline:none;filter:brightness(1.12);
        box-shadow:0 9px 0 var(--stroke),0 14px 26px rgba(0,0,0,.55);}
  .card .cicon{display:block;margin-bottom:5%;color:var(--gold);
        filter:drop-shadow(0 3px 0 var(--stroke));}
  .card .cname{font-family:'Baloo 2',cursive;font-weight:800;color:var(--gold);display:block;margin-bottom:4%;
        font-size:clamp(14px,2.4vmin,21px);letter-spacing:.02em;text-shadow:0 2px 0 var(--stroke);}
  table{margin:1.5% auto;border-collapse:collapse;font-size:clamp(12px,2.2vmin,19px);width:88%;}
  td,th{padding:.6% 1.4%;border-bottom:1px solid rgba(216,184,120,.18);text-align:left;letter-spacing:.06em;}
  th{font-family:'Baloo 2',cursive;color:var(--gold);font-weight:800;letter-spacing:.04em;}
  td.r,th.r{text-align:right;font-variant-numeric:tabular-nums;}
  .sumrow{display:flex;justify-content:space-between;font-size:clamp(13px,2.5vmin,21px);
        margin:.9% 12%;letter-spacing:.08em;}
  .sumrow b{color:var(--gold);font-weight:800;font-family:'Baloo 2',cursive;text-shadow:0 2px 0 var(--stroke);}

  #pausebtn{position:absolute;top:2.2%;left:1.2%;z-index:20;background:rgba(9,11,18,.6);
        border:1px solid rgba(216,184,120,.35);color:#b8b0a0;font-family:'Baloo 2',cursive;font-weight:800;
        font-size:clamp(13px,2.4vmin,18px);line-height:1;padding:.3% 1.1% .5%;cursor:pointer;}
  #pausebtn.hidden{display:none;}
  #modal{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;
        background:radial-gradient(ellipse at 50% 45%,rgba(8,10,18,.5),rgba(3,4,8,.9) 85%);}
  #modal.hidden{display:none;}
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:6%;
        margin:1.9% 8%;font-size:clamp(12px,2.1vmin,17px);letter-spacing:.06em;color:#cfc8b8;}
  .setrow input[type=range]{flex:1;accent-color:#ff46c8;height:4px;}
  .setrow .tog{min-width:64px;padding:.4% 3%;border:1px solid rgba(216,184,120,.5);border-radius:5px;
        background:rgba(14,16,26,.7);color:#cfc8b8;font-family:'Baloo 2',cursive;font-weight:800;font-size:.9em;
        letter-spacing:.1em;cursor:pointer;}
  .setrow .tog.on{color:#0a0410;background:linear-gradient(180deg,#7ce07a,#3fae57);border-color:#7ce07a;}
  .rules{text-align:left;margin:2% 7%;font-size:clamp(11px,1.9vmin,15px);line-height:1.75;color:#c4bcac;letter-spacing:.03em;}
  .rules b{color:var(--gold);font-weight:normal;}
  #bosscard{position:absolute;inset:0;z-index:25;display:none;align-items:center;justify-content:center;
        background:rgba(3,4,8,.55);}
  #bosscard.show{display:flex;animation:bcfade .3s ease-out;}
  @keyframes bcfade{from{opacity:0;}to{opacity:1;}}
  .bc-inner{display:flex;align-items:center;gap:5%;width:76%;padding:2.5% 4%;
        background:linear-gradient(90deg,rgba(40,6,26,.94),rgba(10,4,18,.9));
        border-top:2px solid #ff46c8;border-bottom:2px solid #ff46c8;
        box-shadow:0 0 40px rgba(255,70,200,.4);}
  .bc-inner img{width:34%;max-height:220px;object-fit:contain;filter:drop-shadow(0 6px 20px rgba(0,0,0,.6));
        animation:bcfloat 2.4s ease-in-out infinite;}
  @keyframes bcfloat{50%{transform:translateY(-8px);}}
  .bc-txt{flex:1;text-align:left;}
  .bc-txt .bc-role{font-family:'Baloo 2',cursive;font-weight:800;letter-spacing:.14em;color:#ff8ad0;font-size:clamp(10px,1.9vmin,15px);}
  .bc-txt .bc-name{font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(20px,5vmin,42px);letter-spacing:.08em;
        background:linear-gradient(180deg,#ffe6a0,#ff46c8);-webkit-background-clip:text;background-clip:text;color:transparent;
        margin:1% 0;}
  .bc-txt .bc-flair{color:#b8b0a0;font-size:clamp(11px,2vmin,16px);letter-spacing:.05em;}
  #rotate{position:fixed;inset:0;z-index:99;display:none;align-items:center;justify-content:center;
        background:#05060a;text-align:center;font-family:'Baloo 2',cursive;font-weight:800;color:var(--gold);
        padding:8%;}
  @media (orientation:portrait){ #rotate{display:flex;} }
  .rot-inner{display:flex;flex-direction:column;align-items:center;gap:22px;}
  .rot-phone{width:clamp(96px,34vw,150px);height:auto;color:var(--gold);
        filter:drop-shadow(0 0 16px rgba(216,184,120,.35));}
  .rot-body{transform-origin:60px 62px;animation:rotPhone 2.6s ease-in-out infinite;}
  @keyframes rotPhone{
    0%,18%   {transform:rotate(0deg);}
    45%,72%  {transform:rotate(-90deg);}
    92%,100% {transform:rotate(0deg);}
  }
  .rot-arc{animation:rotArc 2.6s ease-in-out infinite;}
  @keyframes rotArc{0%,18%{opacity:.25;} 34%{opacity:1;} 60%,100%{opacity:.25;}}
  .rot-txt{font-size:clamp(14px,4.4vw,20px);letter-spacing:.22em;}
  @media (prefers-reduced-motion:reduce){
    .rot-body{animation:none;transform:rotate(-90deg);} .rot-arc{animation:none;opacity:.6;}
  }

  /* ---------- Battle Square casino ---------- */
  /* ---- reference-style portrait HUD in the top corners ---- */
  /* inset so the portraits clear the pause button (left) and sound button (right) */
  /* inset on the left so the portraits clear the pause button; the right is free
     now that the sound toggle has moved into the pause menu */
  #hud{position:absolute;top:1.6%;left:0;right:0;z-index:9;display:flex;
       justify-content:space-between;padding:0 2% 0 9%;pointer-events:none;gap:3%;}
  #hud.hidden{display:none;}
  .hudside{display:flex;align-items:center;gap:8px;width:44%;min-width:0;}
  .hudside.right{justify-content:flex-end;}
  .hudpic{width:clamp(34px,6.4vmin,58px);height:clamp(34px,6.4vmin,58px);flex:none;
       border:4px solid var(--stroke);border-radius:12px;overflow:hidden;
       background:linear-gradient(180deg,#6a4a96,#3a2757);
       box-shadow:0 4px 0 var(--stroke),0 6px 12px rgba(0,0,0,.5);}
  .hudpic img,.hudpic canvas{width:100%;height:100%;display:block;object-fit:cover;}
  .hudinfo{flex:1;min-width:0;}
  .hudside.right .hudinfo{text-align:right;}
  .hudname{display:block;font-family:'Baloo 2',cursive;font-weight:800;color:#fff;
       font-size:clamp(11px,2.1vmin,17px);line-height:1.1;margin-bottom:3px;
       -webkit-text-stroke:3px var(--stroke);paint-order:stroke fill;
       white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hudbar{height:clamp(10px,1.9vmin,15px);background:#150d20;
       border:3px solid var(--stroke);border-radius:7px;overflow:hidden;
       box-shadow:inset 0 2px 4px rgba(0,0,0,.7);}
  .hudbar i{display:block;height:100%;width:100%;border-radius:3px;position:relative;
       background:linear-gradient(180deg,var(--hp-hi),var(--hp) 55%,#2f8f27);transition:width .3s;}
  .hudbar i::after{content:"";position:absolute;inset:0 0 55% 0;
       background:rgba(255,255,255,.35);border-radius:3px 3px 0 0;}
  .hudbar.foe i{background:linear-gradient(180deg,#ff9a8a,#ef4536 55%,#a01e15);}
  .hudbar i.low{background:linear-gradient(180deg,#ffb060,#ef4536 55%,#8a1a12);
       animation:lowpulse .55s ease-in-out infinite;}
  @keyframes lowpulse{50%{filter:brightness(1.45);}}
  .hudpic.hurt{border-color:#ef4536;}
  .hudpic.low{animation:lowglow 1s ease-in-out infinite;}
  @keyframes lowglow{50%{box-shadow:0 4px 0 var(--stroke),0 0 16px rgba(239,69,54,.85);}}
  .hudpic.rage{animation:rageglow .7s ease-in-out infinite;}
  @keyframes rageglow{50%{box-shadow:0 4px 0 var(--stroke),0 0 18px rgba(255,90,40,.9);}}
  .hudpic.shake{animation:picshake .32s ease-out;}
  @keyframes picshake{
    0%{transform:translate(0,0) rotate(0);}
    20%{transform:translate(-3px,2px) rotate(-4deg);}
    45%{transform:translate(3px,-2px) rotate(4deg);}
    70%{transform:translate(-2px,1px) rotate(-2deg);}
    100%{transform:translate(0,0) rotate(0);}
  }
  #ribbon{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:8;
        padding:.5% 3% .7%;font-family:'Baloo 2',cursive;font-weight:800;letter-spacing:.06em;
        font-size:clamp(11px,2vmin,17px);color:#ffe9a0;
        background:linear-gradient(180deg,rgba(40,8,52,.92),rgba(12,4,20,.92));
        border:1px solid #ff46c8;border-top:none;
        border-radius:0 0 8px 8px;box-shadow:0 0 18px rgba(255,70,200,.5),inset 0 -8px 16px rgba(255,70,200,.15);}
  #ribbon.hidden{display:none;}
  #bossbar{position:absolute;top:13%;left:3%;width:44%;z-index:7;text-align:left;}
  #bossbar.hidden{display:none;}
  .bb-name{font-family:'Baloo 2',cursive;font-weight:800;letter-spacing:.05em;font-size:clamp(12px,2.2vmin,18px);
        color:#ff8ad0;text-shadow:0 0 10px rgba(255,70,200,.6);margin-bottom:4px;}
  .bb-track{height:11px;background:rgba(0,0,0,.7);border:1px solid #ff46c8;border-radius:2px;overflow:hidden;
        box-shadow:0 0 16px rgba(255,70,200,.5);}
  .bb-track i{display:block;height:100%;width:100%;transition:width .3s;
        background:linear-gradient(180deg,#ff9ad8,#ff46c8 45%,#8a1a6a);}
  #ribbon b{color:#5cf0ff;font-weight:normal;}
  #bp{color:#ffe25a !important;text-shadow:0 0 8px rgba(255,210,60,.6);letter-spacing:.08em;}
  #callout{position:absolute;top:26%;left:50%;transform:translate(-50%,-50%) scale(.4);z-index:9;
        font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(30px,8vmin,72px);letter-spacing:.1em;
        color:#fff;opacity:0;pointer-events:none;white-space:nowrap;
        text-shadow:0 0 18px currentColor,0 3px 0 rgba(0,0,0,.5);}
  #callout.pop{animation:calloutPop .9s ease-out;}
  @keyframes calloutPop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-6deg);}
    18%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(2deg);}
    32%{transform:translate(-50%,-50%) scale(1) rotate(0);}
    75%{opacity:1;}
    100%{opacity:0;transform:translate(-50%,-58%) scale(1);}
  }
  /* slot machine */
  .slot-title{font-family:'Baloo 2',cursive;font-weight:800;letter-spacing:.04em;
        font-size:clamp(18px,4.4vmin,36px);
        background:linear-gradient(180deg,#ffd6f4,#ff46c8 50%,#7a1a8a);
        -webkit-background-clip:text;background-clip:text;color:transparent;
        filter:drop-shadow(0 0 14px rgba(255,70,200,.5));margin:0 0 1%;}
  .reels{display:flex;gap:2%;justify-content:center;margin:2% auto 1%;width:70%;
        padding:2.4% 2%;border-radius:12px;position:relative;
        background:linear-gradient(180deg,#2a0838,#120418);
        border:2px solid #ff46c8;box-shadow:0 0 26px rgba(255,70,200,.45),inset 0 0 26px rgba(0,0,0,.6);}
  .reels::before,.reels::after{content:"";position:absolute;top:8%;bottom:8%;width:6px;border-radius:3px;
        background:repeating-linear-gradient(180deg,#ffe25a 0 8px,#ff46c8 8px 16px);opacity:.8;}
  .reels::before{left:1.5%;} .reels::after{right:1.5%;}
  .reel{flex:1;height:clamp(72px,16vmin,128px);overflow:hidden;border-radius:10px;
        background:radial-gradient(ellipse at 50% 40%,#1a0824,#05020a);
        border:3px solid #5cf0ff;box-shadow:inset 0 0 22px rgba(0,0,0,.85),0 0 14px rgba(92,240,255,.4);
        position:relative;}
  /* curved-drum shading + a glass highlight, so the strip reads as a physical wheel */
  .reel::before{content:"";position:absolute;inset:0;z-index:3;pointer-events:none;
        background:linear-gradient(180deg,rgba(0,0,0,.85),rgba(0,0,0,.15) 26%,
                   rgba(255,255,255,.10) 45%,rgba(0,0,0,.15) 62%,rgba(0,0,0,.9));}
  .reel::after{content:"";position:absolute;left:0;right:0;top:50%;height:0;z-index:4;
        pointer-events:none;transform:translateY(-50%);
        box-shadow:0 0 0 1px rgba(255,226,90,.35);}
  .reel .strip{position:absolute;left:0;right:0;top:0;
        display:flex;flex-direction:column;align-items:center;
        will-change:transform,filter;}
  .reel .cell{display:flex;align-items:center;justify-content:center;
        width:100%;flex:none;color:#e8e2d4;}
  .reel .cell svg{width:clamp(30px,6.6vmin,54px);height:clamp(30px,6.6vmin,54px);
        filter:drop-shadow(0 0 9px rgba(92,240,255,.5));}
  /* the payline the symbol must land on */
  .reel .payline{position:absolute;left:6%;right:6%;top:50%;height:3px;z-index:5;
        transform:translateY(-50%);border-radius:2px;pointer-events:none;
        background:linear-gradient(90deg,transparent,rgba(255,226,90,.85),transparent);
        opacity:.5;transition:opacity .2s;}
  .reel.locked{border-color:#ffe25a;box-shadow:inset 0 0 22px rgba(0,0,0,.8),0 0 24px rgba(255,226,90,.75);}
  .reel.locked .payline{opacity:1;}
  .reel.locked .cell svg{filter:drop-shadow(0 0 12px rgba(255,226,90,.9));}
  .reel.pop{animation:reelpop .30s cubic-bezier(.3,1.7,.5,1);}
  @keyframes reelpop{0%{transform:scale(1);}40%{transform:scale(1.13);}100%{transform:scale(1);}}
  .reels.jackpot{animation:jackglow .5s ease-in-out 3;}
  @keyframes jackglow{50%{box-shadow:0 0 46px rgba(255,226,90,.95),inset 0 0 26px rgba(255,226,90,.35);}}
  /* ---- (5) anticipation: two 7s are showing and the cabinet knows it ---- */
  .reels.anticipate{border-color:#ffe25a;
        animation:anticipate .42s ease-in-out infinite;}
  @keyframes anticipate{
    50%{box-shadow:0 0 40px rgba(255,226,90,.9),inset 0 0 30px rgba(255,180,40,.4);}
  }
  .reel.anticipate{border-color:#ffe25a;
        animation:reelAnticipate .3s ease-in-out infinite;}
  @keyframes reelAnticipate{
    0%,100%{box-shadow:inset 0 0 22px rgba(0,0,0,.85),0 0 18px rgba(255,226,90,.7);}
    50%    {box-shadow:inset 0 0 22px rgba(0,0,0,.85),0 0 40px rgba(255,226,90,1);transform:scale(1.03);}
  }
  .reel.anticipate .payline{opacity:1;background:linear-gradient(90deg,transparent,#ffe25a,transparent);}
  .wagers{display:flex;gap:2.2%;justify-content:center;margin-top:2%;align-items:stretch;}
  .wager{flex:1;max-width:31%;cursor:pointer;font-family:inherit;color:#e8e2d4;
        border-radius:10px;overflow:hidden;text-align:left;position:relative;
        background:linear-gradient(180deg,rgba(24,10,34,.94),rgba(8,3,14,.96));
        border:2px solid rgba(255,70,200,.4);transition:transform .16s,box-shadow .16s,border-color .16s;
        opacity:0;transform:translateY(16px);}
  .wager.in{opacity:1;transform:translateY(0);}
  .wager:hover,.wager:focus-visible{transform:translateY(-6px);border-color:#5cf0ff;outline:none;
        box-shadow:0 12px 30px rgba(0,0,0,.6),0 0 26px rgba(92,240,255,.35);}
  .wager .whead{padding:3% 6% 2.4%;font-family:'Baloo 2',cursive;font-weight:800;letter-spacing:.16em;
        font-size:clamp(11px,2vmin,16px);text-align:center;color:#0a0410;}
  .wager.safe .whead{background:linear-gradient(180deg,#7ce07a,#3fae57);}
  .wager.gamble .whead{background:linear-gradient(180deg,#ffd85a,#e0a020);}
  .wager.wild .whead{background:linear-gradient(180deg,#ff8adc,#ff46c8);color:#fff;}
  .wager.jackpot .whead{background:linear-gradient(90deg,#ffe25a,#ff46c8,#5cf0ff,#ffe25a);
        background-size:300% 100%;animation:jp 2s linear infinite;color:#1a0410;}
  @keyframes jp{to{background-position:300% 0;}}
  .wager .wbody{padding:4% 7% 5%;}
  .wcost{display:flex;align-items:center;gap:6px;font-size:clamp(11px,1.9vmin,16px);margin-bottom:5%;
        color:#ff8a8a;line-height:1.4;}
  .wgain{display:flex;align-items:center;gap:6px;font-size:clamp(11px,1.9vmin,16px);
        color:#8cf0a0;line-height:1.4;}
  .wico{font-size:clamp(20px,4.4vmin,34px);flex:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));}
  .wsep{height:1px;margin:5% 0;background:linear-gradient(90deg,transparent,rgba(216,184,120,.4),transparent);}
  .wager .wname{font-family:'Baloo 2',cursive;font-weight:800;color:#fff;letter-spacing:.04em;}
  #hcbadge{position:absolute;top:2.5%;left:1.6%;z-index:8;font-family:'Baloo 2',cursive;font-weight:800;
        font-size:clamp(10px,1.8vmin,15px);letter-spacing:.1em;color:#ffb0b0;
        padding:.4% 1.2%;border-radius:6px;
        background:rgba(40,6,20,.85);border:1px solid #ff5a7a;box-shadow:0 0 12px rgba(255,90,120,.4);}
  #hcbadge.hidden{display:none;}
  /* ---- icon system: inline SVGs scale with their container ---- */
  .card .cicon svg{width:clamp(26px,5.5vmin,44px);height:clamp(26px,5.5vmin,44px);}
  .card .cicon{color:var(--gold);}
  .reel .strip svg{width:clamp(30px,7vmin,58px);height:clamp(30px,7vmin,58px);
        filter:drop-shadow(0 0 10px rgba(92,240,255,.55));color:#e8e2d4;}
  .wico svg{width:clamp(20px,4.4vmin,34px);height:clamp(20px,4.4vmin,34px);}
  .wcost .wico{color:#ff9aa8;} .wgain .wico{color:#8cf0a0;}
  #hcbadge svg{color:#ffb0b0;vertical-align:-.18em;}
  #gear svg{opacity:.9;vertical-align:-.12em;}
  .cmd svg{vertical-align:-.15em;}
  .setrow svg{vertical-align:-.18em;}
  #pausebtn svg{display:block;color:#b8b0a0;}
  .slot-title svg{vertical-align:-.12em;color:var(--gold);}
  .rules svg,.sumrow svg{vertical-align:-.15em;}
  /* ---- character portraits ---- */
  .portrait{display:block;margin:0 auto 1.5%;width:clamp(72px,15vmin,120px);height:auto;
        filter:drop-shadow(0 6px 18px rgba(0,0,0,.65));}
  .portrait.win{animation:portGlow 2.2s ease-in-out infinite;}
  @keyframes portGlow{50%{filter:drop-shadow(0 6px 22px rgba(255,210,60,.55));}}
  .portrait.dead{filter:drop-shadow(0 6px 18px rgba(0,0,0,.7)) grayscale(.7) brightness(.72);}
  .card .portrait{width:clamp(56px,11vmin,88px);margin-bottom:4%;}
  /* ---- achievements: two columns so nothing has to shrink ---- */
  .achgrid{display:grid;grid-template-columns:1fr 1fr;gap:1.4% 2.4%;margin:2% 3%;}
  .achv{display:flex;align-items:center;gap:8px;text-align:left;
        background:rgba(0,0,0,.22);border:3px solid var(--stroke);border-radius:11px;
        padding:1.6% 2.2%;opacity:.5;}
  .achv.got{opacity:1;background:linear-gradient(180deg,#5a4180,#3a2757);}
  .achv-i{color:#8d84a0;flex:none;display:flex;}
  .achv.got .achv-i{color:var(--gold);filter:drop-shadow(0 2px 0 var(--stroke));}
  .achv-t{flex:1;line-height:1.25;}
  .achv-t b{display:block;font-family:'Baloo 2',cursive;font-weight:800;color:#a99ec0;
        font-size:clamp(11px,1.9vmin,16px);}
  .achv.got .achv-t b{color:var(--gold);}
  .achv-t i{font-style:normal;font-size:clamp(9px,1.5vmin,13px);color:#b8aecc;font-weight:700;}
  .achv-c{color:#5fd943;flex:none;display:flex;}
  .statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.2%;margin:1.6% 3%;}
  .stat{background:rgba(0,0,0,.25);border:3px solid var(--stroke);border-radius:10px;padding:1.4% .6%;}
  .stat span{display:block;font-size:clamp(9px,1.5vmin,12px);color:#b8aecc;font-weight:700;}
  .stat b{display:block;font-family:'Baloo 2',cursive;font-weight:800;color:var(--gold);
        font-size:clamp(13px,2.3vmin,20px);text-shadow:0 2px 0 var(--stroke);}
  /* ---- (6) rarity: the card wears its colour ---- */
  .wager{border-color:var(--rc) !important;
        box-shadow:0 5px 0 var(--stroke),0 0 0 rgba(0,0,0,0);
        animation:dealIn .42s cubic-bezier(.2,1.5,.4,1) backwards;}
  @keyframes dealIn{
    from{opacity:0;transform:translateY(26px) scale(.86) rotate(-3deg);}
    to  {opacity:1;transform:none;}
  }
  .wager .rarity{font-family:'Baloo 2',cursive;font-weight:800;letter-spacing:.14em;
        font-size:clamp(9px,1.5vmin,12px);color:var(--rc);text-align:center;
        margin:1.5% 0 .5%;text-shadow:0 2px 0 var(--stroke);}
  .wager .wname{color:var(--rc) !important;}
  .wager.rar-rare     {box-shadow:0 5px 0 var(--stroke),0 0 16px var(--rg);}
  .wager.rar-epic     {box-shadow:0 5px 0 var(--stroke),0 0 22px var(--rg);}
  .wager.rar-legendary{box-shadow:0 5px 0 var(--stroke),0 0 30px var(--rg);
        animation:dealIn .42s cubic-bezier(.2,1.5,.4,1) backwards, legend 1.6s ease-in-out infinite .5s;}
  @keyframes legend{50%{box-shadow:0 5px 0 var(--stroke),0 0 46px var(--rg);}}
  /* a sheen that sweeps across epic+ cards */
  .wager.rar-epic::after,.wager.rar-legendary::after{
        content:"";position:absolute;inset:0;border-radius:11px;pointer-events:none;
        background:linear-gradient(115deg,transparent 35%,rgba(255,255,255,.30) 50%,transparent 65%);
        background-size:280% 100%;animation:sheen 2.6s linear infinite;}
  @keyframes sheen{from{background-position:180% 0;}to{background-position:-80% 0;}}
  /* ---- LEVEL UP: the attribute rows ---- */
  .statgridup{display:grid;gap:1.2%;margin:2% 4%;}
  .statrow{display:grid;grid-template-columns:auto 1fr auto auto;
        grid-template-areas:"i n v p" "i e e e";
        align-items:center;gap:2% 3%;text-align:left;
        background:linear-gradient(180deg,#5a4180,#3a2757);
        border:3px solid var(--stroke);border-radius:11px;
        padding:1.5% 3%;cursor:pointer;color:#e6dcf4;font-family:inherit;font-weight:700;
        box-shadow:0 4px 0 var(--stroke);transition:transform .1s,filter .12s;}
  .statrow:hover{filter:brightness(1.15);transform:translateY(-2px);}
  .statrow:active{transform:translateY(3px);box-shadow:0 1px 0 var(--stroke);}
  .statrow .si{grid-area:i;color:var(--gold);display:flex;}
  .statrow .sn{grid-area:n;font-family:'Baloo 2',cursive;font-weight:800;
        font-size:clamp(12px,2.1vmin,18px);color:#fff;}
  .statrow .sv{grid-area:v;font-family:'Baloo 2',cursive;font-weight:800;
        font-size:clamp(14px,2.5vmin,22px);color:var(--gold);text-shadow:0 2px 0 var(--stroke);}
  .statrow .sp{grid-area:p;font-family:'Baloo 2',cursive;font-weight:800;
        font-size:clamp(14px,2.4vmin,20px);color:#8cf0a0;
        background:rgba(0,0,0,.3);border-radius:7px;padding:0 .7em;}
  .statrow .se{grid-area:e;font-size:clamp(9px,1.6vmin,13px);color:#b8aecc;line-height:1.3;}
  .pname-lbl{font-family:'Baloo 2',cursive;font-weight:800;letter-spacing:.06em;color:var(--gold);
        font-size:clamp(11px,2vmin,16px);margin-bottom:1.5%;}
  @media (prefers-reduced-motion:reduce){ .cmd.sel::before{animation:none} .card:hover{transform:none}
        #callout.pop{animation:none;opacity:1;} .wager{transition:none;} }
</style>
</head>
<body>
<div id="game">
  <canvas id="cv" width="960" height="540"></canvas>
  <div id="msg" class="panel hidden"></div>
  <div id="cmdwin" class="panel"></div>
  <div id="statwin" class="panel">
    <div class="srow"><span id="pname">CELES</span><span class="tiny" id="roundlbl">ROUND 1</span></div>
    <div class="srow"><span class="lbl">HP</span><div class="bar" id="hpbar"><i></i></div><span class="val" id="hptxt">100/100</span></div>
    <div class="srow"><span class="lbl">MP</span><div class="bar" id="mpbar"><i></i></div><span class="val" id="mptxt">30/30</span></div>
    <div class="srow"><span class="lbl">LB</span><div class="bar" id="lbbar"><i></i></div><span class="val" id="lbtxt">0%</span></div>
    <div class="srow tiny"><span id="gear"></span><span id="scoretxt" style="color:#ffe25a;text-shadow:0 0 8px rgba(255,210,60,.6)">BP 0</span></div>
  </div>
  <div id="hud">
    <!-- LEFT: the enemies, because that is where they stand -->
    <div class="hudside">
      <div class="hudpic" id="hudFoePic"></div>
      <div class="hudinfo">
        <span class="hudname" id="hudFoeName">MONSTERS</span>
        <div class="hudbar foe"><i id="hudFoeBar"></i></div>
      </div>
    </div>
    <!-- RIGHT: the hero, because that is where he stands -->
    <div class="hudside right">
      <div class="hudinfo">
        <span class="hudname" id="hudHeroName">HERO</span>
        <div class="hudbar"><i id="hudHeroBar"></i></div>
      </div>
      <div class="hudpic" id="hudHeroPic"></div>
    </div>
  </div>
  <div id="ribbon" class="hidden">BATTLE <b>1</b> / 8</div>
  <div id="bossbar" class="hidden"><div class="bb-name"></div><div class="bb-track"><i></i></div></div>

  <div id="hcbadge" class="hidden"></div>

  <div id="overlay"><div class="sheet panel" id="sheet"></div></div>

  <div id="bosscard"><div class="bc-inner"><img id="bcimg" alt=""><div class="bc-txt">
    <div class="bc-role">CHALLENGER APPROACHES</div><div class="bc-name" id="bcname"></div>
    <div class="bc-flair" id="bcflair"></div></div></div></div>
</div>
<div id="rotate">
  <div class="rot-inner">
    <svg class="rot-phone" viewBox="0 0 120 120" width="120" height="120" aria-hidden="true">
      <!-- sweep arc showing the direction of rotation -->
      <path class="rot-arc" d="M22 30 A 42 42 0 0 1 98 30" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-dasharray="4 6" opacity=".55"/>
      <path class="rot-arc" d="M98 30 l-9 -3 M98 30 l1 -9" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/>
      <!-- the phone: rotates from portrait to landscape and back -->
      <g class="rot-body">
        <rect x="44" y="34" width="32" height="56" rx="5" ry="5"
              fill="none" stroke="currentColor" stroke-width="3"/>
        <rect x="47.5" y="40" width="25" height="42" rx="1.5" fill="currentColor" opacity=".22"/>
        <rect x="54" y="36.4" width="12" height="2" rx="1" fill="currentColor" opacity=".8"/>
        <circle cx="60" cy="86" r="2" fill="currentColor" opacity=".8"/>
      </g>
    </svg>
    <div class="rot-txt">ROTATE YOUR DEVICE</div>
  </div>
</div>
<script>
"use strict";
/* ============================ UTILS ============================ */
const $=s=>document.querySelector(s);
let SPEED=1;
const sleep=ms=>new Promise(r=>setTimeout(r,ms/SPEED));
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const W=960,H=540;

/* ============================ ICONS (SVG for DOM, vector for canvas) ============================ */
// each entry is inner SVG markup drawn in a 0 0 24 24 viewBox, using currentColor
const ICONS={
  sword:'<path d="M4 20l3-1 9-9 1-4 2-2 1 1-2 2-4 1-9 9-1 3z" fill="currentColor"/><path d="M15 6l3 3" stroke="currentColor" stroke-width="1.4"/>',
  swords:'<path d="M4 20l2-1 7-7-1-1-7 7-1 2z" fill="currentColor"/><path d="M20 20l-2-1-7-7 1-1 7 7 1 2z" fill="currentColor"/>',
  shield:'<path d="M12 3l7 2v6c0 5-3 8-7 10-4-2-7-5-7-10V5l7-2z" fill="currentColor"/>',
  fire:'<path d="M12 3c1 3-2 4-2 7 0 1 1 2 1 2s-2 0-2 2c0 2 2 4 3 4-3 0-6-2-6-6 0-5 5-6 6-9z M13 8c2 1 4 3 4 7 0 3-2 5-5 6 2-1 3-2 3-5 0-3-3-3-2-8z" fill="currentColor"/>',
  ice:'<g stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M12 3v18M4.5 7.5l15 9M19.5 7.5l-15 9"/><path d="M12 6l-2-2M12 6l2-2M12 18l-2 2M12 18l2 2"/></g>',
  bolt:'<path d="M13 2L5 13h5l-1 9 9-13h-6l2-7z" fill="currentColor"/>',
  bolt2:'<path d="M11 2L5 12h3l-1 8 6-10H9l2-8z" fill="currentColor"/><path d="M18 5l-4 6h2l-1 6 4-7h-2l1-5z" fill="currentColor"/>',
  skull:'<path d="M12 3c-4 0-7 3-7 7 0 3 2 5 3 6v3h8v-3c1-1 3-3 3-6 0-4-3-7-7-7z" fill="currentColor"/><circle cx="9.2" cy="10.5" r="1.6" fill="#0a0410"/><circle cx="14.8" cy="10.5" r="1.6" fill="#0a0410"/>',
  heart:'<path d="M12 20S4 14 4 8.5C4 5.5 6.5 4 9 5c1.5.6 2.4 1.8 3 2.6.6-.8 1.5-2 3-2.6 2.5-1 5 .5 5 3.5C20 14 12 20 12 20z" fill="currentColor"/>',
  heartbreak:'<path d="M12 20S4 14 4 8.5C4 5.5 6.5 4 9 5c1.5.6 2.4 1.8 3 2.6.6-.8 1.5-2 3-2.6 2.5-1 5 .5 5 3.5C20 14 12 20 12 20z" fill="currentColor"/><path d="M12 5l-2 5 3 2-2 6" stroke="#0a0410" stroke-width="1.3" fill="none"/>',
  gem:'<path d="M6 4h12l3 5-9 12L3 9l3-5z" fill="currentColor"/><path d="M3 9h18M9 4l3 17M15 4l-3 17" stroke="#0a0410" stroke-width=".8" opacity=".5"/>',
  book:'<path d="M5 4h9a3 3 0 013 3v13H8a3 3 0 01-3-3V4z" fill="currentColor"/><path d="M8 4v13" stroke="#0a0410" stroke-width="1" opacity=".5"/>',
  coin:'<circle cx="12" cy="12" r="9" fill="currentColor"/><circle cx="12" cy="12" r="6" fill="none" stroke="#0a0410" stroke-width="1" opacity=".4"/><path d="M12 8l1.2 2.4 2.6.3-1.9 1.8.5 2.6L12 14.2 9.6 15.4l.5-2.6L8.2 11l2.6-.3L12 8z" fill="#0a0410" opacity=".55"/>',
  slot:'<rect x="4" y="5" width="13" height="14" rx="2" fill="currentColor"/><rect x="6.5" y="8" width="8" height="6" rx="1" fill="#0a0410" opacity=".55"/><path d="M17 9h2a2 2 0 012 2v0a2 2 0 01-2 2" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="20" cy="6" r="1.6" fill="currentColor"/>',
  frog:'<path d="M5 14c0-4 3-7 7-7s7 3 7 7c0 3-2 5-7 5s-7-2-7-5z" fill="currentColor"/><circle cx="8.5" cy="8" r="2.4" fill="currentColor"/><circle cx="15.5" cy="8" r="2.4" fill="currentColor"/><circle cx="8.5" cy="8" r="1" fill="#0a0410"/><circle cx="15.5" cy="8" r="1" fill="#0a0410"/><path d="M9 15c1 1 5 1 6 0" stroke="#0a0410" stroke-width="1.2" fill="none"/>',

function drawGlyph(g,name,x,y,r,color){
  g.save();g.translate(x,y);g.lineWidth=2;g.strokeStyle=color;g.fillStyle=color;
  g.lineCap='round';g.lineJoin='round';
  if(name==='fire'){g.beginPath();g.moveTo(0,-r);g.quadraticCurveTo(r*.8,-r*.2,r*.5,r*.4);g.quadraticCurveTo(r*.3,r,0,r);g.quadraticCurveTo(-r*.5,r,-r*.5,r*.3);g.quadraticCurveTo(-r*.5,-r*.2,0,-r);g.fill();}
  else if(name==='poison'){g.beginPath();g.arc(0,r*.2,r*.7,0,Math.PI*2);g.fill();g.beginPath();g.moveTo(-r*.4,-r*.2);g.lineTo(-r*.7,-r);g.moveTo(r*.4,-r*.2);g.lineTo(r*.7,-r);g.stroke();}
  else if(name==='freeze'){for(let i=0;i<3;i++){g.rotate(Math.PI/3);g.beginPath();g.moveTo(0,-r);g.lineTo(0,r);g.stroke();}}
  else if(name==='stun'){g.beginPath();for(let a=0;a<Math.PI*3.2;a+=.3){const rr=r*a/(Math.PI*3.2);g.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}g.stroke();}
  else if(name==='protect'||name==='shield'){g.beginPath();g.moveTo(0,-r);g.lineTo(r*.8,-r*.5);g.lineTo(r*.8,r*.3);g.quadraticCurveTo(0,r*1.1,0,r);g.quadraticCurveTo(0,r*1.1,-r*.8,r*.3);g.lineTo(-r*.8,-r*.5);g.closePath();g.fill();}
  else if(name==='focus'){g.beginPath();g.moveTo(-r*.6,r);g.lineTo(r*.5,-r*.7);g.lineTo(r,-r);g.lineTo(r*.7,-r*.5);g.lineTo(-r*.4,r*.6);g.closePath();g.fill();}
  else if(name==='defdown'){g.beginPath();g.moveTo(0,r);g.lineTo(-r*.7,-r*.2);g.lineTo(-r*.3,-r*.2);g.lineTo(-r*.3,-r);g.lineTo(r*.3,-r);g.lineTo(r*.3,-r*.2);g.lineTo(r*.7,-r*.2);g.closePath();g.fill();}
  else if(name==='regen'){g.beginPath();g.moveTo(r,-r);g.quadraticCurveTo(-r,-r,-r,r);g.quadraticCurveTo(r*.2,r*.2,r,-r);g.fill();}
  else if(name==='haste'){g.beginPath();g.moveTo(-r,-r*.7);g.lineTo(0,0);g.lineTo(-r,r*.7);g.moveTo(0,-r*.7);g.lineTo(r,0);g.lineTo(0,r*.7);g.stroke();}
  else if(name==='silence'){g.beginPath();g.moveTo(-r,-r*.4);g.lineTo(-r*.3,-r*.4);g.lineTo(r*.2,-r);g.lineTo(r*.2,r);g.lineTo(-r*.3,r*.4);g.lineTo(-r,r*.4);g.closePath();g.fill();g.beginPath();g.moveTo(r*.5,-r*.5);g.lineTo(r,r*.5);g.stroke();}
  else if(name==='doom'){g.beginPath();g.arc(0,-r*.1,r*.7,Math.PI,0);g.lineTo(r*.5,r*.5);g.lineTo(-r*.5,r*.5);g.closePath();g.fill();g.fillStyle='#0a0410';g.beginPath();g.arc(-r*.25,-r*.1,r*.18,0,7);g.arc(r*.25,-r*.1,r*.18,0,7);g.fill();}
  else{g.beginPath();g.arc(0,0,r*.7,0,Math.PI*2);g.fill();}
  g.restore();
}

let fpsSamples=[],fpsCheckT=0,autoDropped=false;
function fpsGuard(dt){
  if(CFG.quality!=='auto'){qTier=CFG.quality;return;}
  if(autoDropped)return;
  fpsSamples.push(dt);
  if(fpsSamples.length>90)fpsSamples.shift();
  fpsCheckT+=dt;
  if(fpsCheckT<2||fpsSamples.length<60)return;
  fpsCheckT=0;
  const sorted=[...fpsSamples].sort((a,b)=>a-b);
  const p90=sorted[Math.floor(sorted.length*0.9)];   // the slow frames, not the average
  if(p90>1/45 && qTier==='high'){qTier='balanced';fpsSamples=[];}
  else if(p90>1/32 && qTier==='balanced'){qTier='battery';autoDropped=true;}
}

let sfxBus=null;
function sfxBusNode(){const c=ac();if(c&&!sfxBus){sfxBus=c.createGain();sfxBus.gain.value=CFG.sfx;sfxBus.connect(c.destination);}return sfxBus;}
function applyVolumes(){if(sfxBus)sfxBus.gain.value=CFG.sfx;if(musicGain)musicGain.gain.value=CFG.music*.9;}
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==='suspended')AC.resume();return AC;}
function tone(f0,f1,dur,type='square',vol=0.16,when=0){
  const c=ac();if(!c||muted)return;
  const t=c.currentTime+when,o=c.createOscillator(),g=c.createGain();
  o.type=type;o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  const bus=sfxBusNode()||c.destination;o.connect(g).connect(bus);o.start(t);o.stop(t+dur+.02);
}
function noise(dur,vol=0.2,when=0,hp=400){
  const c=ac();if(!c||muted)return;
  const t=c.currentTime+when,n=c.createBufferSource(),b=c.createBuffer(1,c.sampleRate*dur,c.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=b;const f=c.createBiquadFilter();f.type='highpass';f.frequency.value=hp;
  const g=c.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  const bus=sfxBusNode()||c.destination;n.connect(f).connect(g).connect(bus);n.start(t);
}

/* ---- auto-fit: scale any panel down so it always fits — menus never scroll ---- */
let _fitting=false;
function fitSheet(el){
  if(!el||!el.parentElement)return;
  el.style.transform='none';
  const box=el.parentElement.getBoundingClientRect();
  if(!box.height||!box.width)return;
  const nh=el.scrollHeight, nw=el.scrollWidth;   // natural, unscaled size
  if(!nh||!nw)return;
  const s=Math.min(1,(box.height*0.95)/nh,(box.width*0.97)/nw);
  el.style.transform=s<0.999?'scale('+s.toFixed(4)+')':'none';
}
function fitAllSheets(){
  if(_fitting)return;
  _fitting=true;                       // our own style writes must not retrigger the observer
  fitSheet($('#sheet'));fitSheet($('#modalsheet'));
  requestAnimationFrame(()=>{_fitting=false;});
}
(function(){
  const mo=new MutationObserver(()=>{if(!_fitting)requestAnimationFrame(fitAllSheets);});
  const sh=$('#sheet'),ms=$('#modalsheet');
  // content changes only — NOT attributes, or our own transform would loop
  const opt={childList:true,subtree:true,characterData:true};
  if(sh)mo.observe(sh,opt);
  if(ms)mo.observe(ms,opt);
  // panel show/hide is signalled by a class flip on the container
  const ov=$('#overlay'),md=$('#modal');
  if(ov)mo.observe(ov,{attributes:true,attributeFilter:['class']});
  if(md)mo.observe(md,{attributes:true,attributeFilter:['class']});
  addEventListener('resize',fitAllSheets);
  addEventListener('orientationchange',()=>setTimeout(fitAllSheets,150));
  if(document.fonts&&document.fonts.ready)document.fonts.ready.then(fitAllSheets);
})();

let musicGain=null, musicTheme=null, musicPlaying=false, musStep=0, musNext=0, musTimer=null;
const NOTE={C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196,A3:220,Bb3:233.08,B3:246.94,
  C4:261.63,D4:293.66,Eb4:311.13,E4:329.63,F4:349.23,G4:392,A4:440,Bb4:466.16,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880,_:0};
const THEMES_MUS={
  title:{bpm:84,step:.5,
    bass:['A2','A2','F2','F2','C3','C3','E3','E3'].map(n=>n),
    arp:['A3','C4','E4','C4','F3','A3','C4','A3','C3','E3','G3','E3','E3','G3','B3','G3'],
    lead:['_','_','E4','_','_','_','C4','_','_','_','A3','_','_','_','B3','_']},
  battle:{bpm:132,step:.25,
    bass:['A2','A2','E3','A2','F2','F2','C3','F2','G2','G2','D3','G2','E3','E3','B2','E3'],
    arp:['A3','E4','A4','E4','A3','E4','A4','E4','F3','C4','F4','C4','G3','D4','G4','D4'],
    lead:['A4','_','C5','_','E5','_','C5','A4','F4','_','A4','_','G4','_','B4','D5']},
  boss:{bpm:120,step:.25,
    bass:['D2','D2','D2','A2','Bb2','Bb2','Bb2','F2','C3','C3','C3','G2','A2','A2','E2','A2'],
    arp:['D3','A3','D4','F4','D3','A3','D4','F4','Bb3','D4','F4','Bb4','A3','C4','E4','A4'],
    lead:['_','_','D5','_','F5','_','_','E5','_','D5','_','C5','_','_','A4','_']}
};
function noteHz(n){if(!n||n==='_')return 0;const m=n.match(/([A-G]b?)(\d)/);if(!m)return NOTE[n]||0;
  const base={C:16.35,D:18.35,E:20.6,F:21.83,G:24.5,A:27.5,Bb:29.14,B:30.87}[m[1]];return base*Math.pow(2,+m[2]);}
function musVoice(freq,dur,type,vol,t,glideTo){
  const c=ac();if(!c||!musicGain||!freq)return;
  const o=c.createOscillator(),g=c.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,t);
  if(glideTo)o.frequency.exponentialRampToValueAtTime(glideTo,t+dur);
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.015);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g).connect(musicGain);o.start(t);o.stop(t+dur+.02);
}
function musScheduleStep(s,t){
  const M=THEMES_MUS[musicTheme];if(!M)return;
  const sd=60/M.bpm*(M.step/.25)*.25; // seconds per step
  // bass (every step, half-length legato)
  const b=M.bass[s%M.bass.length];if(b&&b!=='_')musVoice(noteHz(b),sd*1.6,'triangle',.16,t);
  // arp (busy)
  const a=M.arp[s%M.arp.length];if(a&&a!=='_')musVoice(noteHz(a),sd*.9,'square',.045,t);
  // lead (sparser, softer)
  const l=M.lead[s%M.lead.length];if(l&&l!=='_')musVoice(noteHz(l),sd*1.4,'sawtooth',.05,t);
  // soft kick on strong beats for battle/boss
  if(musicTheme!=='title'&&s%4===0){const c=ac();if(c){const o=c.createOscillator(),g=c.createGain();
    o.type='sine';o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(45,t+.12);
    g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.14);
    o.connect(g).connect(musicGain);o.start(t);o.stop(t+.16);}}
}
function musLoop(){
  const c=ac();if(!c||!musicPlaying)return;
  const M=THEMES_MUS[musicTheme];const sd=60/M.bpm*(M.step/.25)*.25;
  while(musNext < c.currentTime+.25){musScheduleStep(musStep,musNext);musNext+=sd;musStep=(musStep+1)%16;}
  musTimer=setTimeout(musLoop,40);
}
function startMusic(theme){
  if(muted)return;const c=ac();if(!c)return;
  if(!musicGain){musicGain=c.createGain();musicGain.gain.value=CFG.music*.9;musicGain.connect(c.destination);}
  if(musicTheme===theme&&musicPlaying)return;
  musicTheme=theme;
  if(!musicPlaying){musicPlaying=true;musStep=0;musNext=c.currentTime+.08;musLoop();}
}
function stopMusic(){musicPlaying=false;if(musTimer)clearTimeout(musTimer);musTimer=null;}


/* ============================ CHARACTER ART (procedural, painterly) ============================ */
/* Each creature is drawn with gradients, form-shading and rim light onto a super-sampled
   offscreen buffer, cached, then composited with a soft ink outline. Light is top-left. */
function _lg(g,x0,y0,x1,y1,st){const q=g.createLinearGradient(x0,y0,x1,y1);st.forEach(s=>q.addColorStop(s[0],s[1]));return q;}
function _rg(g,x,y,r0,r,st){const q=g.createRadialGradient(x,y,r0,x,y,r);st.forEach(s=>q.addColorStop(s[0],s[1]));return q;}
function _ell(g,x,y,rx,ry,rot){g.beginPath();g.ellipse(x,y,rx,ry,rot||0,0,7);g.fill();}
function _orb(g,x,y,r,lo,hi){g.fillStyle=_rg(g,x-r*.35,y-r*.35,0,r*1.35,[[0,hi],[.6,lo],[1,lo]]);_ell(g,x,y,r,r);}
function _poly(g,pts){g.beginPath();g.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);g.closePath();g.fill();}
function _shade(hex,f){const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  if(f>0){r+=(255-r)*f;g+=(255-g)*f;b+=(255-b)*f;}else{r*=1+f;g*=1+f;b*=1+f;}
  return'#'+((1<<24)+(Math.round(r)<<16)+(Math.round(g)<<8)+Math.round(b)).toString(16).slice(1);}

/* ---- individual creature painters (native coords, feet at h, centre at w/2) ---- */
/* ============================================================================
   CARTOON ART KIT — flat cel colours, thick ink outlines, big readable eyes
   ========================================================================== */
const INK='#2b1d38';
function _P(g,pts){g.beginPath();g.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++)g.lineTo(pts[i][0],pts[i][1]);g.closePath();}
function _E(g,x,y,rx,ry,rot){g.beginPath();g.ellipse(x,y,Math.max(.1,rx),Math.max(.1,ry),rot||0,0,7);}
function _RR(g,x,y,w,h,r){g.beginPath();
  g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}
// fill the current path, then ink it
function _fi(g,fill,lw,ink){
  g.fillStyle=fill;g.fill();
  if(lw!==0){g.strokeStyle=ink||INK;g.lineWidth=lw||3;g.lineJoin='round';g.lineCap='round';g.stroke();}
}
// cel shading: a soft lighter cap and a darker underside on a filled shape
function _cel(g,pathFn,base,up,dn){
  pathFn();g.save();g.clip();
  g.fillStyle=base;g.fillRect(-999,-999,3000,3000);
  if(up){g.fillStyle=up;g.globalAlpha=.55;g.fillRect(-999,-999,3000,1400);g.globalAlpha=1;}
  g.restore();
}
// the signature cartoon eye: white ball, big dark pupil, hot highlight
function _eye(g,x,y,r,dx,dy,lw){
  _E(g,x,y,r,r*1.12);_fi(g,'#ffffff',lw||2.4);
  g.fillStyle='#22182e';_E(g,x+(dx||0),y+(dy||0),r*.52,r*.6);g.fill();
  g.fillStyle='#ffffff';_E(g,x+(dx||0)+r*.22,y+(dy||0)-r*.28,r*.2,r*.2);g.fill();
}
// an angry cartoon brow
function _brow(g,x,y,len,tilt,col,th){
  g.save();g.translate(x,y);g.rotate(tilt);
  g.fillStyle=col||INK;_RR(g,-len/2,-(th||3)/2,len,th||3,1.4);g.fill();
  g.restore();
}

/* ============================================================================
   POSES — the hero is baked per pose so attacks read as real animation
   ========================================================================== */
const HERO_POSES={
  idle:   {swing:0,    lean:0,    crouch:0,   step:0,  armLift:0,  mouth:'grin'},
  windup: {swing:-1.05,lean:-0.14,crouch:.04, step:-3, armLift:-6, mouth:'grit'},
  slash:  {swing:1.30, lean:0.20, crouch:.02, step:9,  armLift:9,  mouth:'shout'},
  recover:{swing:0.42, lean:0.07, crouch:.01, step:4,  armLift:4,  mouth:'grin'},
  cast:   {swing:-0.55,lean:0.04, crouch:0,   step:0,  armLift:-9, mouth:'grit'},
  guard:  {swing:-0.20,lean:-0.06,crouch:.07, step:-2, armLift:-3, mouth:'grit'},
  hurt:   {swing:0.20, lean:-0.22,crouch:.06, step:-6, armLift:3,  mouth:'ouch'},
  win:    {swing:-1.5, lean:-0.05,crouch:0,   step:2,  armLift:-14,mouth:'grin'},
};
/* The body is laid out in a fixed 120x150 logical box; paintHero centres that
   box inside a roomier canvas so long staves and wide swings never clip. */
const HERO_BOX_W=120, HERO_BOX_H=150;
const HERO_FOOT=0.87;                 // where the feet sit in the taller canvas
function paintHero(g,w,h,C,poseName){
  g.save();
  // feet land on the foot line; the space below it lets the blade follow through
  g.translate((w-HERO_BOX_W)/2, h*HERO_FOOT-HERO_BOX_H);
  paintHeroBody(g,HERO_BOX_W,HERO_BOX_H,C,poseName);
  g.restore();
}
function paintHeroBody(g,w,h,C,poseName){
  /* Cartoon JRPG hero, 3/4 view facing LEFT toward the foes.
     Chunky proportions, big head, spiky hair, flat cel armour, thick ink. */
  const PS=HERO_POSES[poseName||'idle']||HERO_POSES.idle;
  const cx=w*.55, gy=h-5;
  const F=-1, X=d=>cx+d*F;
  const sink=h*PS.crouch, st=PS.step;
  const cls=C.wclass||'sword';
  const SK=C.skin, SKd=_shade(SK,-.18);
  const AR=C.plate, ARh=C.plateHi, ARd=_shade(AR,-.32);
  const CL=C.cloth, CLd=_shade(CL,-.3);
  const LE='#8a5a34', LEd='#6a4023';     // leather gloves + boots
  const HAIR=C.plume, HAIRh=C.plumeHi;

  /* ---------- BACK leg ---------- */
  _P(g,[[X(-6),h*.66+sink],[X(-17),h*.67+sink],[X(-22),h*.88],[X(-8),h*.9]]);
  _fi(g,CLd,3);
  _RR(g,Math.min(X(-24),X(-2)),gy-13,22,13,5);_fi(g,LEd,3);   // back boot

  /* ---------- FRONT leg ---------- */
  _P(g,[[X(-2),h*.66+sink],[X(11),h*.66+sink],[X(15+st),h*.88],[X(1+st),h*.9]]);
  _fi(g,CL,3);
  _RR(g,Math.min(X(-1+st),X(21+st)),gy-14,24,14,5);_fi(g,LE,3); // front boot
  _RR(g,Math.min(X(1+st),X(19+st)),gy-15,18,5,2.5);_fi(g,_shade(LE,.22),0); // cuff

  /* ---------- FAR arm (behind) ---------- */
  g.save();g.translate(X(-6),h*.52+sink);g.rotate(F*(0.5+PS.swing*.15));
  _RR(g,-6,0,12,26,6);_fi(g,ARd,3);
  g.restore();
  _E(g,X(-16),h*.68+sink,7,6.4);_fi(g,LEd,3);   // far glove

  /* ---------- TORSO (leans into the swing) ---------- */
  g.save();
  g.translate(X(0),h*.68);g.rotate(F*PS.lean);g.translate(-X(0),-(h*.68));
  const ty=sink;
  // chest plate — a chunky rounded wedge
  g.beginPath();
  g.moveTo(X(-13),h*.48+ty);
  g.quadraticCurveTo(X(-2),h*.42+ty, X(13),h*.48+ty);
  g.quadraticCurveTo(X(17),h*.6+ty, X(13),h*.7);
  g.lineTo(X(-11),h*.7);
  g.quadraticCurveTo(X(-16),h*.6+ty, X(-13),h*.48+ty);
  g.closePath();
  _fi(g,AR,3.2);
  // highlight down the leading edge
  g.beginPath();
  g.moveTo(X(4),h*.46+ty);g.quadraticCurveTo(X(15),h*.52+ty,X(12),h*.68);
  g.lineTo(X(6),h*.68);g.quadraticCurveTo(X(9),h*.55+ty,X(4),h*.46+ty);
  g.closePath();_fi(g,ARh,0);
  // chest emblem
  _E(g,X(1),h*.56+ty,5.5,5.5);_fi(g,C.trim,2.2);
  // belt
  _RR(g,Math.min(X(-13),X(13)),h*.695,26,8,3);_fi(g,LEd,2.8);
  _RR(g,Math.min(X(-3),X(3)),h*.7,7,6,2);_fi(g,C.trim,2);
  // near pauldron — big and round, the cartoon signature
  _E(g,X(6),h*.47+ty,13,11,F*-.2);_fi(g,ARh,3.2);
  _E(g,X(7),h*.45+ty,8,6,F*-.2);_fi(g,_shade(ARh,.3),0);
  g.restore();

  /* ---------- HEAD — big, 3/4, facing left ---------- */
  const hy=h*.30+sink, HR=19;
  // neck
  _RR(g,Math.min(X(-5),X(5)),h*.42+ty-2,10,8,3);_fi(g,SKd,2.6);
  // face shape: rounded, with a jaw and a hint of nose in profile
  g.beginPath();
  g.moveTo(X(-14),hy-6);
  g.quadraticCurveTo(X(-16),hy+9, X(-6),hy+15);      // back of jaw
  g.quadraticCurveTo(X(3),hy+20, X(11),hy+13);       // chin
  g.quadraticCurveTo(X(16),hy+8, X(16),hy+3);        // cheek to nose
  g.lineTo(X(20),hy+1);                              // NOSE
  g.lineTo(X(15),hy-3);
  g.quadraticCurveTo(X(14),hy-16, X(0),hy-17);       // brow to crown
  g.quadraticCurveTo(X(-13),hy-17, X(-14),hy-6);
  g.closePath();
  _fi(g,SK,3);
  // cheek blush + jaw shade
  g.globalAlpha=.5;_E(g,X(9),hy+7,5,3.4);_fi(g,'#e88a7a',0);g.globalAlpha=1;
  // ear
  _E(g,X(-9),hy+2,3.6,4.6);_fi(g,SKd,2.4);
  // EYES — near eye large, far eye smaller (3/4 view)
  _eye(g,X(11),hy-1,4.2,F*1.2,0,2.4);
  _eye(g,X(1),hy-2,3.4,F*1.1,0,2.2);
  // thick angry brows
  _brow(g,X(11),hy-7,10,F*-0.34,INK,3.4);
  _brow(g,X(1),hy-8,9,F*-0.22,INK,3.2);
  // MOUTH — changes with the pose
  const m=PS.mouth;
  if(m==='grin'){
    g.beginPath();g.moveTo(X(2),hy+9);g.quadraticCurveTo(X(9),hy+15,X(14),hy+7);
    g.strokeStyle=INK;g.lineWidth=2.6;g.lineCap='round';g.stroke();
    g.beginPath();g.moveTo(X(3.5),hy+10);g.quadraticCurveTo(X(9),hy+13,X(13),hy+8);
    g.lineTo(X(3.5),hy+10);g.closePath();_fi(g,'#ffffff',0);
  }else if(m==='shout'){
    _E(g,X(8),hy+11,6,5.2,F*.2);_fi(g,'#5a2030',2.6);
    _E(g,X(8),hy+13,4,2.6,F*.2);_fi(g,'#e8607a',0);
    _P(g,[[X(3),hy+8],[X(13),hy+8],[X(12),hy+10],[X(4),hy+10]]);_fi(g,'#ffffff',0);
  }else if(m==='grit'){

const artCache=new Map();

function drawEntity(ctx,ci,cx,fy,dh,squash,alpha){
  squash=squash||1;alpha=alpha==null?1:alpha;

  const baseType=[...ENEMY_TYPES].find(t=>t.id===u.base);
  const t={...baseType,...u,name:u.name,hp:Math.round(baseType.hp*u.boostHp),atk:Math.round(baseType.atk*u.boostAtk)};
  const e=makeEnemy(t,m,cx,fy,1);e.dh=u.dh||e.dh;e.bonusBP=u.bonusBP;e.unique=1;return e;
}

// scaling grades, as in Dark Souls: S is a monster, E is a rounding error
const GRADE={S:1.00,A:0.78,B:0.58,C:0.42,D:0.28,E:0.14};
const GRADE_COL={S:'#ffd23a',A:'#ff8ad0',B:'#c088ff',C:'#5cf0ff',D:'#8cf0a0',E:'#b8c0d0'};
function statOf(k){return (P&&P.stats&&P.stats[k])||0;}
// how much a piece of kit gets from your stats
function scaleBonus(scale){
  if(!scale)return 0;
  let t=0;
  for(const k in scale)t+=GRADE[scale[k]]*statOf(k);
  return t;
}
// do you actually meet the requirements to wield this?
function meetsReq(req){
  if(!req)return true;
  for(const k in req)if(statOf(k)<req[k])return false;
  return true;
}
function missingReq(req){
  const out=[];
  if(!req)return out;
  for(const k in req)if(statOf(k)<req[k])out.push(ATTRS.find(a=>a.id===k).abbr+' '+req[k]);
  return out;
}
function reqText(req){
  if(!req)return '';
  return Object.keys(req).map(k=>{
    const A=ATTRS.find(a=>a.id===k);
    const ok=statOf(k)>=req[k];
    return '<span style="color:'+(ok?'#8cf0a0':'#ff8a8a')+'">'+A.abbr+' '+req[k]+'</span>';
  }).join(' · ');
}
function scaleText(scale){
  if(!scale)return '';
  return Object.keys(scale).map(k=>{
    const A=ATTRS.find(a=>a.id===k);
    return A.abbr+' <b style="color:'+GRADE_COL[scale[k]]+'">'+scale[k]+'</b>';
  }).join(' · ');
}

function arenaLayers(skin){

    if(hy>HOR-20)continue;

    for(let i=0;i<6;i++){const a=i/6*Math.PI*2+Math.PI/6;
      const px=hx+Math.cos(a)*R*.5, py=hy+Math.sin(a)*R*.5;
      i?x.lineTo(px,py):x.moveTo(px,py);}
    x.closePath();x.stroke();
  }
  // giant hovering holo-screens flanking the arena
  const screen=(sx,sy,sw,sh)=>{
    x.fillStyle='rgba(6,10,22,.9)';_RRx(x,sx,sy,sw,sh,4);x.fill();
    x.strokeStyle=S.neon;x.lineWidth=2;x.stroke();
    x.save();x.beginPath();_RRx(x,sx+3,sy+3,sw-6,sh-6,3);x.clip();
    const gg=x.createLinearGradient(sx,sy,sx,sy+sh);
    gg.addColorStop(0,'rgba(92,240,255,.30)');gg.addColorStop(1,'rgba(255,70,200,.20)');
    x.fillStyle=gg;x.fillRect(sx,sy,sw,sh);
    // scanlines
    x.fillStyle='rgba(0,0,0,.25)';
    for(let ly=sy;ly<sy+sh;ly+=4)x.fillRect(sx,ly,sw,1.6);
    // a crude "combatant" waveform readout
    x.strokeStyle='rgba(255,255,255,.5)';x.lineWidth=1.4;x.beginPath();
    for(let i=0;i<sw;i+=4){const yy=sy+sh*.6+Math.sin(i*.18)*sh*.14*Math.sin(i*.05);

  };

  const deck=x.createLinearGradient(0,HOR-130,0,HOR);
  deck.addColorStop(0,S.deck[0]);deck.addColorStop(1,S.deck[1]);
  x.fillStyle=deck;
  x.beginPath();x.moveTo(0,HOR-118);x.lineTo(W,HOR-118);x.lineTo(W,HOR-26);x.lineTo(0,HOR-26);
  x.closePath();x.fill();

  for(let row=0;row<7;row++){

    for(let cxp=8;cxp<W;cxp+=9){
      const c=S.crowd[(cxp+row*3)%S.crowd.length];

  x.fillStyle=S.panel;x.fillRect(0,HOR-30,W,32);
  x.fillStyle=S.trim;x.fillRect(0,HOR-30,W,3);
  x.fillStyle=S.neon;x.fillRect(0,HOR-6,W,2.4);
  for(let bx=14;bx<W;bx+=96){
    x.fillStyle=(bx/96|0)%2?S.neon:S.neon2;
    x.globalAlpha=.75;_RRx(x,bx,HOR-25,64,14,3);x.fill();x.globalAlpha=1;
  }
  // floodlight rigs
  for(const lx of[130,340,620,830]){
    x.fillStyle='#2a2340';_RRx(x,lx-16,HOR-150,32,16,3);x.fill();
    x.fillStyle=S.neon2;_RRx(x,lx-11,HOR-146,22,8,2);x.fill();
    const beam=x.createLinearGradient(lx,HOR-136,lx,HOR);
    beam.addColorStop(0,S.beam+'.20)');beam.addColorStop(1,S.beam+'0)');
    x.fillStyle=beam;

    x.lineTo(lx+40,HOR);x.lineTo(lx-40,HOR);x.closePath();x.fill();

  for(const[dx,dy] of[[240,150],[700,132],[490,178]]){

    x.moveTo(dx+12,dy-4);x.lineTo(dx+20,dy-8);x.stroke();

  const sd=x.createLinearGradient(0,0,W,0);
  sd.addColorStop(0,'rgba(0,0,0,.55)');sd.addColorStop(.5,'rgba(0,0,0,0)');sd.addColorStop(1,'rgba(0,0,0,.55)');
  x.fillStyle=sd;x.fillRect(0,0,W,HOR);

  /* ======================= NEAR: the combat deck ========================== */
  // horizon light bar
  const hg=n.createLinearGradient(0,HOR-16,0,HOR+8);
  hg.addColorStop(0,'rgba(0,0,0,0)');hg.addColorStop(1,S.trim);
  n.globalAlpha=.5;n.fillStyle=hg;n.fillRect(0,HOR-16,W,24);n.globalAlpha=1;
  // metal deck
  const fg=n.createLinearGradient(0,HOR,0,H);
  fg.addColorStop(0,S.floor[0]);fg.addColorStop(1,S.floor[1]);
  n.fillStyle=fg;n.fillRect(0,HOR,W,H-HOR);
  // perspective panel seams
  const vpx=W/2;
  n.strokeStyle='rgba(0,0,0,.35)';n.lineWidth=2;
  for(let i=0;i<=9;i++){const t=i/9,yy=HOR+(H-HOR)*(t*t);
    n.beginPath();n.moveTo(0,yy);n.lineTo(W,yy);n.stroke();}
  for(let i=-8;i<=8;i++){
    n.beginPath();n.moveTo(vpx+i*12,HOR);n.lineTo(vpx+i*112,H);n.stroke();}
  // the raised combat pad (an ellipse of brighter plating)
  n.save();n.translate(W/2,H*.80);n.scale(1,.30);
  n.beginPath();n.arc(0,0,360,0,Math.PI*2);

  n.lineWidth=5;n.strokeStyle=S.trim;n.beginPath();n.arc(0,0,392,0,Math.PI*2);n.stroke();

  n.beginPath();n.arc(0,0,130,0,Math.PI*2);n.stroke();
  n.restore();
  // glowing hazard chevrons around the pad edge
  n.save();n.translate(W/2,H*.80);n.scale(1,.30);
  n.fillStyle=S.neon2;n.globalAlpha=.6;
  for(let i=0;i<24;i++){const a=i/24*Math.PI*2;
    n.save();n.translate(Math.cos(a)*375,Math.sin(a)*375);n.rotate(a);
    n.fillRect(-11,-5,22,10);n.restore();}
  n.globalAlpha=1;n.restore();

  for(const px of[70,250,710,890]){
    const py=H*.70;

  arenaLayerCache[skin]={far,near};
  return arenaLayerCache[skin];
}

/* recompute everything the stats feed. Current HP/MP are CLAMPED, never scaled —
   so a gear swap can't heal you, and a stat gain grants exactly what it should. */
function recalcStats(){
  if(!P)return;
  P.maxhp=maxHPFor(P.stats);
  P.maxmp=maxMPFor(P.stats);
  P.hp=clamp(P.hp,1,P.maxhp);
  P.mp=clamp(P.mp,0,P.maxmp);
  const l=limitForBuild();
  P.limitId=l.id;P.limitName=l.name;
  updateStatus();
}
function raiseStat(id,n){
  if(!P)return;
  n=n||1;
  const oldMaxHP=P.maxhp, oldMaxMP=P.maxmp;
  P.stats[id]=(P.stats[id]||0)+n;
  P.maxhp=maxHPFor(P.stats);
  P.maxmp=maxMPFor(P.stats);
  // you gain exactly the HP/MP the new points bought you — no more
  P.hp=clamp(P.hp+Math.max(0,P.maxhp-oldMaxHP),1,P.maxhp);
  P.mp=clamp(P.mp+Math.max(0,P.maxmp-oldMaxMP),0,P.maxmp);
  const l=limitForBuild();
  P.limitId=l.id;P.limitName=l.name;
  updateStatus();
}
/* ============================================================================
   (2) ENEMY ANIMATION + (6) EXPRESSIVE REACTIONS
   Enemies get squash/stretch springs, a wind-up coil, a lunge, a recoil hop,
   and a face expression that changes with what is happening to them.
   ========================================================================== */
function enemyAnimInit(e){
  e.sq=0;e.sqV=0;      // squash & stretch spring
  e.hop=0;e.hopV=0;    // vertical reaction hop
  e.tilt=0;e.tiltV=0;  // lean spring
  e.expr='idle';       // idle | angry | hurt | happy | scared
  e.exprT=0;
}
function enemySpring(e,dt){
  if(e.sq===undefined)enemyAnimInit(e);
  e.sqV+=(0-e.sq)*44*dt;e.sqV*=Math.pow(.0022,dt);e.sq+=e.sqV*dt;
  e.hopV+=(0-e.hop)*40*dt;e.hopV*=Math.pow(.003,dt);e.hop+=e.hopV*dt;e.hopV+=520*dt*(e.hop<0?1:0);
  e.tiltV+=(0-e.tilt)*38*dt;e.tiltV*=Math.pow(.0025,dt);e.tilt+=e.tiltV*dt;
  if(e.exprT>0){e.exprT-=dt;if(e.exprT<=0)e.expr=e.enraged?'angry':'idle';}
}
/* Cartoon emotion symbols — the Saturday-morning shorthand */
function drawExpression(g,e,x,y,r){
  const ex=e.expr;if(!ex||ex==='idle')return;
  const t=tGlobal;
  g.save();
  if(ex==='angry'){
    // the classic four-veined anger mark, throbbing
    const p=1+Math.sin(t*11)*.12;
    g.save();g.translate(x+r*.9,y-r*.15);g.scale(p,p);
    g.strokeStyle='#ff3a4a';g.lineWidth=2.6;g.lineCap='round';
    for(let i=0;i<4;i++){const a=i*Math.PI/2+Math.PI/4;
      const c=Math.cos(a)*5,s2=Math.sin(a)*5;
      g.beginPath();g.moveTo(c*.35,s2*.35);g.lineTo(c,s2);
      g.moveTo(c,s2);g.lineTo(c-s2*.35,s2+c*.35);g.stroke();}
    g.restore();
    // steam puffs
    g.globalAlpha=.55;g.fillStyle='#ffb0b0';
    for(let i=0;i<2;i++){const ph=(t*1.6+i*.5)%1;
      g.beginPath();g.arc(x-r*.7+i*8,y-r*.6-ph*16,3+ph*3,0,7);g.fill();}
    g.globalAlpha=1;
  }else if(ex==='hurt'){
    // dizzy stars orbiting the head
    for(let i=0;i<3;i++){
      const a=t*5+i*2.1, sx=x+Math.cos(a)*r*.95, sy=y-r*.35+Math.sin(a)*r*.3;
      g.save();g.translate(sx,sy);g.rotate(a*2);
      g.fillStyle='#ffe25a';g.strokeStyle=INK;g.lineWidth=1.6;
      g.beginPath();
      for(let k=0;k<5;k++){const aa=k*Math.PI*2/5-Math.PI/2;
        g.lineTo(Math.cos(aa)*5,Math.sin(aa)*5);
        const ab=aa+Math.PI/5;g.lineTo(Math.cos(ab)*2.2,Math.sin(ab)*2.2);}
      g.closePath();g.fill();g.stroke();g.restore();
    }
  }else if(ex==='scared'){
    // a big sweat drop sliding down
    const ph=(t*1.3)%1;
    g.save();g.translate(x+r*.85,y-r*.35+ph*7);
    g.fillStyle='#9fe8ff';g.strokeStyle=INK;g.lineWidth=1.8;
    g.beginPath();g.moveTo(0,-7);g.quadraticCurveTo(5,0,4,3.5);
    g.quadraticCurveTo(2.5,7,0,7);g.quadraticCurveTo(-2.5,7,-4,3.5);
    g.quadraticCurveTo(-5,0,0,-7);g.closePath();g.fill();g.stroke();
    g.fillStyle='rgba(255,255,255,.85)';g.beginPath();g.arc(-1.2,2,1.2,0,7);g.fill();
    g.restore();
    // wobble lines
    g.globalAlpha=.6;g.strokeStyle='#bfe8ff';g.lineWidth=1.6;
    g.beginPath();g.moveTo(x-r*.9,y-r*.5);g.lineTo(x-r*.7,y-r*.55);g.stroke();
    g.globalAlpha=1;
  }else if(ex==='happy'){
    // sparkles of relief
    g.fillStyle='#8cf0a0';
    for(let i=0;i<3;i++){const a=t*2+i*2.1;
      const sx=x+Math.cos(a)*r*.9, sy=y-r*.4+Math.sin(a*1.3)*r*.35;
      const sz=2+Math.abs(Math.sin(t*4+i))*2.5;
      g.beginPath();
      g.moveTo(sx,sy-sz);g.lineTo(sx+sz*.35,sy-sz*.35);g.lineTo(sx+sz,sy);
      g.lineTo(sx+sz*.35,sy+sz*.35);g.lineTo(sx,sy+sz);g.lineTo(sx-sz*.35,sy+sz*.35);
      g.lineTo(sx-sz,sy);g.lineTo(sx-sz*.35,sy-sz*.35);g.closePath();g.fill();}
  }
  g.restore();
}
function enemyReact(e,kind){
  if(e.sq===undefined)enemyAnimInit(e);
  if(kind==='hit'){e.sq=.22;e.sqV=0;e.hop=-9;e.hopV=-140;e.tilt=.16;e.expr='hurt';e.exprT=.75;}
  else if(kind==='windup'){e.sq=-.10;e.sqV=0;e.tilt=-.13;e.expr='angry';e.exprT=1.1;}
  else if(kind==='strike'){e.sq=.16;e.sqV=0;e.tilt=.2;e.expr='angry';e.exprT=.7;}
  else if(kind==='heal'){e.sq=-.12;e.hop=-6;e.expr='happy';e.exprT=.9;}
  else if(kind==='scared'){e.expr='scared';e.exprT=1.2;e.sq=.1;}
  else if(kind==='enrage'){e.expr='angry';e.exprT=3;e.sq=-.18;e.hop=-14;e.hopV=-200;}
}

function springStep(dt){
  if(!P)return;
  P.sLean=P.sLean||0;P.sVel=P.sVel||0;P.sqz=P.sqz||0;P.sqzV=P.sqzV||0;
  const vx=(P.ox-(P._lastOx||0))/Math.max(.001,dt);P._lastOx=P.ox;

    opts.push({id:'bp:300',icon:'coin',name:'300 BP',desc:'A tidy purse of Battle Points'});
  }
  if(tier<=1){

    opts.push(statBoon(pick(ATTRS).id,1));
    opts.push({id:'potions',icon:'potion',name:'Twin Potions',desc:'Add 2 Potions'});

let pendingFlourish=null;
function applyBoon(id){
  if(id.startsWith('stat:')){
    const[,k,n]=id.split(':');
    raiseStat(k,+n);
    const A=ATTRS.find(x=>x.id===k);
    pendingFlourish=[A.name.toUpperCase()+' +'+n,'#ffd23a'];
  }
  else if(id.startsWith('wpn:')){
    P.wpn=+id.split(':')[1];
    P.owned=P.owned||{wpn:{}};P.owned.wpn=P.owned.wpn||{};P.owned.wpn[P.wpn]=1;
    pendingFlourish=[WEAPONS[P.wpn].n.toUpperCase(),'#ffe25a'];
  }
  else if(id.startsWith('arm:')){
    P.arm=+id.split(':')[1];
    pendingFlourish=[ARMORS[P.arm].n.toUpperCase(),'#8cf0a0'];
  }
  else if(id.startsWith('spell:')){
    const k=id.split(':')[1];
    if(!P.spells.includes(k))P.spells.push(k);
    pendingFlourish=[SPELLS[k].name.toUpperCase()+' LEARNED','#c8a0ff'];
  }
  else if(id.startsWith('relic:')){
    P.relic=id.split(':')[1];
    pendingFlourish=[RELICS[P.relic].name.toUpperCase()+' EQUIPPED','#ff8ad0'];
  }
  else if(id.startsWith('bp:')){score+=+id.split(':')[1];}
  else if(id==='heal')P.hp=Math.min(P.maxhp,P.hp+Math.round(P.maxhp*.6));
  else if(id==='potions')P.items.potion+=2;
  else if(id==='ether')P.items.ether+=1;
  recalcStats();
}
function pDef(){
  const A=ARMORS[P.arm];
  let d=A.def+Math.floor(statOf('end')*0.45);

    const sz=(p.size||26)*(0.5+0.5*p.pop)*ease;
    ctx.save();
    ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);
    if(p.crit){const w=Math.sin(tGlobal*30)*.04;ctx.rotate(w);}
    ctx.font='800 '+sz.toFixed(1)+'px "Baloo 2",cursive';
    ctx.textAlign='center';ctx.globalAlpha=a;
    ctx.lineJoin='round';
    ctx.lineWidth=Math.max(5,sz*.22);ctx.strokeStyle=INK;ctx.strokeText(p.txt,0,0);
    const grd=ctx.createLinearGradient(0,-sz*.7,0,sz*.25);
    grd.addColorStop(0,'#ffffff');grd.addColorStop(.45,p.color);grd.addColorStop(1,_shade(p.color.length===7?p.color:'#ffffff',-.35));
    ctx.fillStyle=grd;ctx.fillText(p.txt,0,0);
    ctx.restore();
  }
  ctx.globalAlpha=1;
  popups=popups.filter(p=>p.t>0);
  if(flashScreen){flashScreen.t-=dt*3;
    ctx.save();ctx.globalCompositeOperation='lighter';
    ctx.fillStyle=flashScreen.c;ctx.globalAlpha=clamp(flashScreen.t,0,.45)*(CFG.reduceFlash?.22:1);
    ctx.fillRect(0,0,W,H);ctx.restore();
    if(flashScreen.t<=0)flashScreen=null;}
  ctx.restore();
  postProcess(th);
  drawTurnOrder();
  drawCine(ctx,dt);        // letterbox bars + broadcast titles, above everything
}
function drawTurnOrder(){
  if(gameState!=='battle'||!enemies)return;
  const live=enemies.filter(e=>e.hp>0&&e.deadT===undefined);
  if(live.length<2)return;
  const seq=[{n:'YOU',you:1},...live.map(e=>({n:e.name.split(' ')[0],you:0}))];
  ctx.save();
  ctx.font='800 13px "Baloo 2",cursive';ctx.textBaseline='middle';ctx.textAlign='left';
  // measure
  let total=0;const gap=ctx.measureText(' ▸ ').width;
  const widths=seq.map(s=>ctx.measureText(s.n).width);
  total=widths.reduce((a,b)=>a+b,0)+gap*(seq.length-1)+ctx.measureText('TURN  ').width;
  let x=W/2-total/2, y=100;
  // backing pill
  ctx.fillStyle='rgba(6,8,16,.55)';
  roundRectPath(ctx,x-12,y-13,total+24,26,8);ctx.fill();
  ctx.fillStyle='#8a8478';ctx.fillText('TURN',x,y);x+=ctx.measureText('TURN  ').width;
  for(let i=0;i<seq.length;i++){
    ctx.fillStyle=seq[i].you?'#ffe25a':(i===1?'#ff8ad0':'#c8bca8');
    ctx.fillText(seq[i].n,x,y);x+=widths[i];
    if(i<seq.length-1){ctx.fillStyle='#5a6478';ctx.fillText(' ▸ ',x,y);x+=gap;}
  }
  ctx.restore();
}
function roundRectPath(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
/* ---------- (8) the arena is alive: drones drift, screens flicker, the crowd reacts ---------- */
let crowdHype=0;                     // spikes on big hits, decays away
function hypeCrowd(n){crowdHype=clamp(crowdHype+n,0,1);}
/* The crowd is ~750 rects a frame. We render it to an offscreen canvas and
   only redraw that canvas a few times a second — the eye cannot tell, and it
   takes the single heaviest loop in the game almost entirely off the hot path. */
let crowdC=null,crowdX=null,crowdT=0,crowdSkin=-1;
function crowdCanvas(skin){
  if(!crowdC){crowdC=document.createElement('canvas');crowdC.width=W;crowdC.height=140;
    crowdX=crowdC.getContext('2d');}
  return crowdC;
}
function repaintCrowd(skin){
  const S=ARENA_SKINS[skin]||ARENA_SKINS[0];
  const q=Q();
  crowdCanvas(skin);
  crowdX.clearRect(0,0,W,140);
  const t=tGlobal;
  const rows=q.crowdRows;
  for(let row=0;row<rows;row++){
    const yy=row*12+4;
    for(let cxp=8;cxp<W;cxp+=9){
      const seed=(cxp*.37+row*1.9);
      const flick=.18+.5*Math.abs(Math.sin(seed+t*(1.2+crowdHype*7)));
      const jump=crowdHype*Math.abs(Math.sin(seed*2.1+t*11))*4;
      crowdX.globalAlpha=Math.min(1,flick+crowdHype*.45);
      crowdX.fillStyle=S.crowd[(cxp+row*3)%S.crowd.length];
      crowdX.fillRect(cxp+(row%2?4:0),yy-jump,3.6,4.6);
    }
  }
  crowdX.globalAlpha=1;
}
function drawArenaLive(g,dt,skin){
  const S=ARENA_SKINS[skin]||ARENA_SKINS[0];
  const q=Q();
  const HOR=H*.56;
  crowdHype=Math.max(0,crowdHype-dt*.55);
  const t=tGlobal;

  // --- the crowd, redrawn only a few times a second (and faster when hyped) ---
  crowdT-=dt;
  // the crowd animates harder when hyped, but the repaint rate is capped so a
  // big moment can never spike the frame cost
  const interval=1/clamp(q.crowdFPS*(1+crowdHype*0.5),4,q.crowdFPS*1.5);
  if(crowdT<=0||skin!==crowdSkin){repaintCrowd(skin);crowdT=interval;crowdSkin=skin;}
  if(crowdC)g.drawImage(crowdC,0,HOR-116);

  // --- holo-screens flicker and scan ---
  if(q.screens){
    g.save();
    for(const[sx,sy,sw,sh] of [[60,46,150,86],[750,46,150,86],[400,26,160,52]]){
      const fl=.10+Math.abs(Math.sin(t*1.7+sx))*.12+crowdHype*.28;
      g.globalAlpha=fl;g.fillStyle=S.neon;
      g.fillRect(sx+3,sy+3,sw-6,sh-6);
      const sc=((t*.45+sx*.002)%1)*(sh-6);
      g.globalAlpha=.30;g.fillStyle='#ffffff';
      g.fillRect(sx+3,sy+3+sc,sw-6,2.4);
      if(Math.sin(t*3.1+sx)>.94){g.globalAlpha=.5;g.fillStyle=S.trim;
        g.fillRect(sx+3,sy+8+((t*97+sx)%(sh-20)),sw-6,4);}
    }
    g.globalAlpha=1;g.restore();
  }

  // --- camera drones drift and bob ---
  g.save();
  const drones=[[240,150,1],[700,132,-1],[490,178,.6]].slice(0,q.drones);
  drones.forEach(([dx,dy,dir],i)=>{
    const px=dx+Math.sin(t*.42+i*2.1)*26*dir;
    const py=dy+Math.sin(t*.9+i*1.3)*7;
    g.fillStyle='#1c1730';_RR(g,px-11,py-6,22,12,5);g.fill();
    g.strokeStyle=S.neon;g.lineWidth=1.6;g.stroke();
    g.fillStyle='#0a1420';g.beginPath();g.arc(px-4,py+1,3.2,0,7);g.fill();
    g.fillStyle=S.neon;g.beginPath();g.arc(px-4,py+1,1.4,0,7);g.fill();
    if(Math.sin(t*4+i)>0){g.fillStyle='#ff4060';g.beginPath();g.arc(px+6,py-1,2.2,0,7);g.fill();
      if(q.bloom)glow(px+6,py-1,7,'rgba(255,64,96,.8)',.7);}
    g.strokeStyle='rgba(180,220,255,'+(.25+Math.abs(Math.sin(t*22+i))*.2)+')';g.lineWidth=1.8;
    g.beginPath();g.moveTo(px-13,py-5);g.lineTo(px-22,py-9);
    g.moveTo(px+13,py-5);g.lineTo(px+22,py-9);g.stroke();
  });
  g.restore();

  // --- floodlight beams pulse with the hype ---
  if(q.beams){
    g.save();g.globalCompositeOperation='lighter';
    for(const lx of[130,340,620,830]){
      const pulse=.05+Math.abs(Math.sin(t*.8+lx*.01))*.05+crowdHype*.18;
      const beam=g.createLinearGradient(lx,HOR-136,lx,HOR);
      beam.addColorStop(0,S.beam+pulse.toFixed(3)+')');
      beam.addColorStop(1,S.beam+'0)');
      g.fillStyle=beam;
      g.beginPath();g.moveTo(lx-12,HOR-136);g.lineTo(lx+12,HOR-136);
      g.lineTo(lx+44,HOR);g.lineTo(lx-44,HOR);g.closePath();g.fill();
    }
    g.restore();
  }
}

let hazard=null;    // {id,turns} — telegraphed, then fires
function maybeHazard(){
  // no hazards in the opening battles, and never on a champion round
  if(round<4||encounterType()==='champion')return;

    const id=pick(Object.keys(HAZARDS));

async function tickHazard(){
  if(!hazard)return false;

  const H=HAZARDS[hazard.id];hazard=null;
  await say(H.name+'!  '+H.desc,1200);clearMsg();

  if(enemies.every(e=>e.hp<=0)){await roundWon();return true;}

function drawHazard(g,dt){

function postProcess(th){

  ctx.save();ctx.globalCompositeOperation='saturation';ctx.globalAlpha=.22;

/* The command bar's height changes with the menu, so on phones we measure it and

/* ---- make the game box exactly fit what the user can actually SEE ---- */
function fitGame(){
  const g=$('#game');if(!g)return;
  const vv=window.visualViewport;
  const vw=vv?vv.width :document.documentElement.clientWidth;
  const vh=vv?vv.height:document.documentElement.clientHeight;
  if(!vw||!vh)return;
  const s=Math.min(vw/16,vh/9);          // the largest 16:9 box that truly fits

  g.style.height=Math.floor(s*9)+'px';

  else if(e.key==='ArrowUp'){do{menuSel=(menuSel+menuItems.length-1)%menuItems.length;}while(menuItems[menuSel].dis);refreshSel();SFX.move();}
  else if(e.key==='Enter'||e.key==='z'||e.key==='Z'||e.key===' '){const it=menuItems[menuSel];if(it&&!it.dis&&menuCb){SFX.ok();menuCb(it.id);}}
