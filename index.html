/* ============================ STATUS EFFECTS ============================ */
const STATUS={
  burn:  {icon:'fire',dot:.07,turns:3,col:'#ff8040',name:'Burn'},
  poison:{icon:'potion',dot:.06,turns:4,col:'#b070f0',name:'Poison'},
  freeze:{icon:'ice',skip:true,turns:1,col:'#8ce0ff',name:'Freeze'},
  stun:  {icon:'spiral',skip:true,turns:1,col:'#ffe25a',name:'Stun'},
  protect:{icon:'shield',turns:3,col:'#8cf0a0',name:'Protect'},
  focus: {icon:'sword',turns:3,col:'#ffd23a',name:'Focus'},
  defdown:{icon:'arrowdown',turns:3,col:'#ff8ad0',name:'Def Down'},
  regen: {icon:'heart',heal:.08,turns:4,col:'#7ce07a',name:'Regen'},
  haste: {icon:'haste',turns:3,col:'#5cf0ff',name:'Haste'},
  silence:{icon:'mute',turns:3,col:'#c8b0ff',name:'Silence'},
  doom:  {icon:'skull',turns:3,col:'#c088ff',name:'Doom'},
};
function hasStatus(ent,n){return !!(ent&&ent.st&&ent.st[n]>0);}
function applyStatus(ent,name){
  if(!ent)return;const d=STATUS[name];if(!d)return;
  if(ent!==P&&ent.immune&&ent.immune.includes(name)){
    const cc=enemyCenter(ent);addPopup(cc.x,cc.y-40,'IMMUNE','#9aa2b8');return;
  }
  if(ent===P&&P.relic==='warding'&&(name==='freeze'||name==='stun')){
    addPopup(P.cx,P.fy-170,'WARDED','#8cf0a0');return;
  }
  ent.st=ent.st||{};ent.st[name]=d.turns;
  const isP=ent===P;
  const px=isP?ent.cx:ent.cx, py=isP?ent.fy-170:enemyCenter(ent).y-46;
  addPopup(px,py,d.name.toUpperCase(),d.col);
}
// returns {skip, dot, heal, doom} — call at the START of the entity's turn
function tickStatus(ent){
  if(!ent||!ent.st)return{skip:false,dot:0,heal:0,doom:0};
  let skip=false,dot=0,heal=0,doom=0;
  const maxhp=ent===P?P.maxhp:ent.maxhp;
  for(const k of Object.keys(ent.st)){
    if(ent.st[k]<=0){delete ent.st[k];continue;}
    const d=STATUS[k];if(!d){delete ent.st[k];continue;}
    if(d.dot)dot+=Math.max(1,Math.round(maxhp*d.dot));
    if(d.heal)heal+=Math.max(1,Math.round(maxhp*d.heal));
    if(d.skip)skip=true;
    ent.st[k]--;
    if(k==='doom'&&ent.st[k]<=0)doom+=Math.round(maxhp*.45); // countdown detonates
    if(ent.st[k]<=0)delete ent.st[k];
  }
  return{skip,dot,heal,doom};
}
function statusKeys(ent){return ent&&ent.st?Object.keys(ent.st).filter(k=>ent.st[k]>0):[];}
// draw a row of vector status glyphs centered at x,y
function drawStatusRow(g,ent,x,y,r){
  const keys=statusKeys(ent);if(!keys.length)return;
  const step=r*2.6, total=(keys.length-1)*step;
  keys.forEach((k,i)=>{
    const d=STATUS[k];if(!d)return;
    const gx=x-total/2+i*step;
    g.save();g.globalAlpha=.35;g.fillStyle='#05070e';
    g.beginPath();g.arc(gx,y,r*1.5,0,Math.PI*2);g.fill();g.restore();
    drawGlyph(g,STATUS_GLYPH[k]||'sparkle',gx,y,r,d.col);
  });
}

/* ============================ DAMAGE ============================ */
async function damageEnemy(e,dmg,elem,opts){
  opts=opts||{};
  let mult=1,note='';
  if(elem===e.weak){mult=1.8;note=CFG.cbPalette?'WEAK ▲':'WEAK';}
  else if(elem===e.res){mult=.5;note=CFG.cbPalette?'RESIST ▼':'resist';}
  let final=Math.max(1,Math.round(dmg*mult+rnd(-2,2)));
  const crit=opts.crit;
  if(crit)final=Math.round(final*1.7);
  e.hp=Math.max(0,e.hp-final);
  e.flash=1;shake=Math.min(1,.3+final/70);
  enemyReact(e,'hit');
  if(e.hp>0&&e.hp/e.maxhp<.2)enemyReact(e,'scared');   // wide-eyed when nearly done
  // interrupt a charging boss if enough damage lands before it fires
  if(e.charging&&e.hp>0&&(e.chargeStart-e.hp)>=e.chargeInterrupt){
    e.charging=null;applyStatus(e,'stun');
    const cc=enemyCenter(e);callout('INTERRUPTED!','#5cf0ff');
    burst(cc.x,cc.y,['#5cf0ff','#fff','#ffe25a'],22,120,30,.6);
  }
  // champion transformation at half health
  if(e.phase2&&!e.phased&&e.hp>0&&e.hp/e.maxhp<=.5)triggerPhase2(e);
  punch(final>=28||mult>1||crit?.09:.05); // hit-stop
  const c=enemyCenter(e);
  if(final>=28||crit||mult>1)camPunch(crit?1.1:1.06,c.x,c.y);
  stats.dmgDealt+=final;score+=final;
  if(P.relic==='vampiric'&&P.hp<P.maxhp){const h=Math.round(final*.15);if(h>0){P.hp=Math.min(P.maxhp,P.hp+h);P.flash=1;addPopup(P.cx,P.fy-150,'+'+h,'#90ff90');}}
  bumpCombo();
  if(mult>1){stats.weakHits=(stats.weakHits||0)+1;score+=15;}
  // status infliction (burn/freeze/poison riders)
  if(opts.inflict&&e.hp>0&&Math.random()<(opts.inflictChance||.4))applyStatus(e,opts.inflict);
  // enrage: mark low-HP foes so their attacks hit harder
  if(e.behavior&&e.behavior.includes('enrage')&&!e.enraged&&e.hp>0&&e.hp/e.maxhp<=.35){
    e.enraged=true;enemyReact(e,'enrage');callout(e.name+' is enraged!','#ff6048');
  }
  const dcol=crit?'#ffd23a':mult>1?'#ffe270':mult<1?'#9aa2b8':'#ffffff';
  addPopup(c.x,c.y-24,String(final),dcol,crit||mult>1||final>=30,{crit});
  if(crit){buzz([0,25,30,25]);toon('pow',c.x,c.y,{col:'#ffd23a',txt:'CRIT!',life:.6,scale:1.05});hypeCrowd(.9);}
  else if(mult>1){toon('pow',c.x,c.y,{col:'#ff8a3a',txt:'WEAK!',life:.55,scale:.9});hypeCrowd(.7);}
  else if(final>=26){toon('star',c.x,c.y,{col:'#ffffff',col2:dcol,life:.4,scale:.85});hypeCrowd(.45);}
  if(crit)addPopup(c.x,c.y-58,'CRITICAL!','#ffd23a');
  else if(note)addPopup(c.x,c.y-56,note,mult>1?'#ff8858':'#9aa2b8');
  SFX.hit();
  updateStatus();
  if(e.hp<=0){
    await sleep(240);
    SFX.die();
    onEnemyDefeated(e,c,final,dmg*mult);
    e.deadT=1;
    deathFX(e,c);
    const iv=setInterval(()=>{e.deadT-=.08;
      if(e.deadT<=0){e.deadT=0;clearInterval(iv);}},40);
    await sleep(560);
    if(e.explosive)await explode(e,c);
  }else{
    // split: on first drop below half HP, spawn a smaller copy
    if(e.behavior&&e.behavior.includes('split')&&!e.hasSplit&&e.hp/e.maxhp<=.5&&enemies.filter(x=>x.hp>0).length<4){
      e.hasSplit=true;await splitEnemy(e);
    }
    await sleep(340);
  }
}
function onEnemyDefeated(e,c,killingBlow,rawDmg){
  let bp=25*round+(e.bonusBP||0);
  if(P.relic==='fortune')bp+=30;
  // overkill bonus — big finishing blows pay extra
  if(killingBlow>=e.maxhp*.4){bp+=Math.round(killingBlow);addPopup(c.x,c.y-96,'OVERKILL! +'+Math.round(killingBlow),'#ff8ad0');}
  score+=bp;addPopup(c.x,c.y-70,'+'+bp,'#e8cc88');
  LT.kills=(LT.kills||0)+1;
  if(e.phase2||e.phased)LT.champions=(LT.champions||0)+1;
  else if(e.boss)LT.bosses=(LT.bosses||0)+1;
  saveLT();
}
async function explode(e,c){
  callout('DEATH BURST!','#ff6048');flashScreen={c:'#ffb0a0',t:.4};SFX.fire();shake=1;
  burst(c.x,c.y,['#ff6048','#ffb040','#fff'],30,140,20,.8);
  await sleep(200);
  const dmg=Math.max(6,Math.round((e.atkS||14)*1.1));
  const before=P.hp;P.hp=Math.max(1,P.hp-dmg); // never lethal
  P.hurt=1;addPopup(P.cx,P.fy-150,String(before-P.hp),'#ff7860',true);
  updateStatus();await sleep(400);
}

async function splitEnemy(e){

let toons=[];   // {kind,x,y,t,life,col,col2,txt,rot,scale}
function toon(kind,x,y,opts){

    col:opts.col||'#ffe25a',col2:opts.col2||'#ff8a3a',

function drawToons(g,dt){
  for(const o of toons){
    o.t-=dt/o.life;
    const p=1-o.t;                       // 0 → 1 over the effect's life
    const a=clamp(o.t*1.6,0,1);
    g.save();g.globalAlpha=a;
    g.translate(o.x,o.y);g.rotate(o.rot);
    if(o.kind==='star'){                 // spiky impact star, pops then shrinks
      const sc=(p<.25?p/.25:1-(p-.25)*.35)*o.scale;
      g.scale(sc,sc);
      g.beginPath();
      for(let i=0;i<12;i++){const ang=i/12*Math.PI*2;
        const r=(i%2?16:40);
        g.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);}
      g.closePath();
      g.fillStyle=o.col;g.strokeStyle=INK;g.lineWidth=5;g.lineJoin='round';g.fill();g.stroke();
      g.beginPath();
      for(let i=0;i<12;i++){const ang=i/12*Math.PI*2;
        const r=(i%2?8:22);
        g.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);}
      g.closePath();g.fillStyle=o.col2;g.fill();
    }else if(o.kind==='pow'){            // a POW! word-burst
      const sc=(p<.2?p/.2:1+(p-.2)*.25)*o.scale;
      g.scale(sc,sc);
      g.beginPath();
      for(let i=0;i<16;i++){const ang=i/16*Math.PI*2;
        const r=(i%2?30:52)+Math.sin(i*3)*4;
        g.lineTo(Math.cos(ang)*r,Math.sin(ang)*r);}
      g.closePath();
      g.fillStyle=o.col;g.strokeStyle=INK;g.lineWidth=5;g.lineJoin='round';g.fill();g.stroke();
      g.font='800 30px "Baloo 2",cursive';g.textAlign='center';g.textBaseline='middle';
      g.lineWidth=6;g.strokeStyle=INK;g.strokeText(o.txt,0,1);
      g.fillStyle='#fff';g.fillText(o.txt,0,1);
    }else if(o.kind==='ring'){           // expanding shockwave ring
      const r=10+p*70;
      g.strokeStyle=o.col;g.lineWidth=(1-p)*11+2;g.globalAlpha=a*.85;
      g.beginPath();g.arc(0,0,r,0,7);g.stroke();
      g.strokeStyle=INK;g.lineWidth=2;g.globalAlpha=a*.5;
      g.beginPath();g.arc(0,0,r,0,7);g.stroke();
    }else if(o.kind==='bolt'){           // thick jagged cartoon lightning
      const sc=o.scale;g.scale(sc,sc);
      const seg=[[0,-150],[-14,-84],[10,-72],[-16,-14],[12,-6],[-6,54]];
      g.beginPath();g.moveTo(seg[0][0],seg[0][1]);
      for(const[px,py]of seg)g.lineTo(px,py);
      for(let i=seg.length-1;i>=0;i--)g.lineTo(seg[i][0]+16,seg[i][1]+6);
      g.closePath();
      g.fillStyle=o.col;g.strokeStyle=INK;g.lineWidth=5;g.lineJoin='round';
      g.fill();g.stroke();
      g.fillStyle='#fff';g.globalAlpha=a*.75;
      g.beginPath();g.moveTo(2,-140);
      for(const[px,py]of seg)g.lineTo(px+5,py+4);
      g.lineTo(8,50);g.closePath();g.fill();
    }else if(o.kind==='puff'){           // chunky cloud puff
      const sc=(.5+p*.9)*o.scale;g.scale(sc,sc);
      g.fillStyle=o.col;g.strokeStyle=INK;g.lineWidth=4;g.lineJoin='round';
      g.beginPath();
      for(let i=0;i<7;i++){const ang=i/7*Math.PI*2;
        g.arc(Math.cos(ang)*20,Math.sin(ang)*14,15,0,7);}
      g.fill();g.stroke();
    }else if(o.kind==='slash'){          // a bold curved slash arc
      const sc=o.scale;g.scale(sc,sc);
      g.strokeStyle=INK;g.lineWidth=16;g.lineCap='round';
      g.beginPath();g.arc(0,0,44,-1.15,.75);g.stroke();
      g.strokeStyle=o.col;g.lineWidth=9;
      g.beginPath();g.arc(0,0,44,-1.1,.7);g.stroke();
      g.strokeStyle='#fff';g.lineWidth=3.5;
      g.beginPath();g.arc(0,0,44,-1.0,.5);g.stroke();
    }
    g.restore();
  }
  g.globalAlpha=1;
  toons=toons.filter(o=>o.t>0);
}

function encounterType(){
  if(round%GAUNTLET===0)return'champion';
  if(round%5===0)return'boss';
  const r10=round%10;
  if(r10===3||r10===7)return'mini';
  return'normal';
}
function spawnEnemies(){
  enemies=[];
  const enc=encounterType();
  const m=1+(round-1)*0.22;
  if(enc==='champion'){
    const ci=Math.floor(round/GAUNTLET)-1;
    const champ=CHAMPIONS[ci%CHAMPIONS.length];
    enemies.push(makeEnemy(champ,1+ci*0.35,250,372,1));
  }else if(enc==='boss'){
    const b=BOSSES[(Math.floor(round/5)-1)%BOSSES.length];
    enemies.push(makeEnemy(b,1+(round-1)*0.16,250,366,1));
  }else if(enc==='mini'){
    const b=MINIBOSSES[(Math.floor(round/4))%MINIBOSSES.length];
    const e=makeEnemy(b,1+(round-1)*0.14,250,366,1);
    // roll an elite affix
    const af=pick(AFFIXES);af.apply(e);e.name=af.prefix+' '+e.name;e.affix=af.id;
    enemies.push(e);
  }else{
    const maxTier=round<=3?1:round<=6?2:3;
    const n=round===1?1:round<=2?2:ri(2,3);
    const pool=ENEMY_TYPES.filter(t=>t.tier<=maxTier);
    // [cx, fy, size, row] — back row sits higher/upstage
    const spots=n===1?[[250,360,1.06,'front']]
      :n===2?[[196,366,1.06,'front'],[300,326,.9,'back']]
      :[[160,368,1.08,'front'],[262,370,1.02,'front'],[236,320,.86,'back']];
    const casterIds=['mage','ghost','wraith'];
    let uniqueSlot=(round>=4&&Math.random()<.16)?ri(0,n-1):-1;
    // sort so casters prefer back-row slots
    const backSlots=spots.map((s,i)=>[s,i]).filter(([s])=>s[3]==='back');
    for(let i=0;i<n;i++){
      let e;
      if(i===uniqueSlot){e=makeUnique(pick(UNIQUES),m,spots[i][0],spots[i][1]);}
      else{let t=pick(pool);e=makeEnemy(t,m,spots[i][0],spots[i][1],spots[i][2]);}
      e.row=spots[i][3];
      enemies.push(e);
    }
    // if a caster ended up front while a bruiser is back, swap positions so casters hide
    if(n>=2){
      const front=enemies.filter(e=>e.row==='front'), back=enemies.filter(e=>e.row==='back');
      const frontCaster=front.find(e=>casterIds.includes(e.id));
      const backBruiser=back.find(e=>!casterIds.includes(e.id));
      if(frontCaster&&backBruiser){
        [frontCaster.cx,backBruiser.cx]=[backBruiser.cx,frontCaster.cx];
        [frontCaster.fy,backBruiser.fy]=[backBruiser.fy,frontCaster.fy];
        [frontCaster.row,backBruiser.row]=[backBruiser.row,frontCaster.row];
      }
    }
  }
  theme=ARENA_TI; // Battle Square arena is the one true stage
}

function drawBubble(g,dt){

  bubble.t-=dt/bubble.life;

  if(bubble.t<=0){bubble=null;return;}
  const b=bubble;

    if(g.measureText(test).width>250&&cur){lines.push(cur);cur=w2;}else cur=test;}
  if(cur)lines.push(cur);
  const lh=21, padX=16, padY=12;
  let bw=0;for(const l of lines)bw=Math.max(bw,g.measureText(l).width);
  bw+=padX*2;const bh=lines.length*lh+padY*2;
  const bx=clamp(b.x-bw/2,10,W-bw-10), by=Math.max(28,b.y-bh-16);
  // pop-in scale, easing past 1 then settling
  const sc=b.pop<1?(.5+b.pop*.62):1;
  const a=clamp(b.t*3,0,1);
  g.globalAlpha=a;
  g.translate(bx+bw/2,by+bh);g.scale(sc,sc);g.translate(-(bx+bw/2),-(by+bh));
  // the bubble body
  _RR(g,bx,by,bw,bh,14);
  g.fillStyle='#ffffff';g.fill();
  g.strokeStyle=INK;g.lineWidth=4;g.lineJoin='round';g.stroke();
  // the tail, pointing down at the speaker

  g.beginPath();
  g.moveTo(tx-12,by+bh-2);g.lineTo(tx+4,by+bh+18);g.lineTo(tx+10,by+bh-2);
  g.closePath();g.fillStyle='#ffffff';g.fill();
  g.strokeStyle=INK;g.lineWidth=4;
  g.beginPath();g.moveTo(tx-12,by+bh-1);g.lineTo(tx+4,by+bh+18);g.lineTo(tx+10,by+bh-1);g.stroke();
  // the words
  g.fillStyle='#2b1d38';g.textAlign='center';g.textBaseline='middle';

}

async function playerTurn(){
  if(P.hp<=0)return;
  P.defending=false;
  // the Gamemakers' hazard, telegraphed last turn, lands now
  if(await tickHazard())return;
  if(P.hp<=0)return;
  const ts=tickStatus(P);
  // regen status + Sage Ring relic healing
  let heal=ts.heal||0;
  if(P.relic==='regen'&&P.hp<P.maxhp)heal+=Math.round(P.maxhp*.05);
  if(heal>0&&P.hp<P.maxhp){
    P.hp=Math.min(P.maxhp,P.hp+heal);P.flash=1;
    addPopup(P.cx,P.fy-150,'+'+heal,'#90ff90');glow(P.cx,P.fy-64,90,'rgba(140,255,150,.5)',.7);
    updateStatus();await sleep(360);
  }
  // damage-over-time: venom handicap + burn/poison + doom detonation
  let dot=ts.dot||0;
  if(handicap==='venom')dot+=Math.max(1,Math.round(P.maxhp*.06));
  if(ts.doom){callout('DOOM!','#c088ff');dot+=ts.doom;flashScreen={c:'#c088ff',t:.4};SFX.dark();}
  if(dot>0){
    P.hp=Math.max(0,P.hp-dot);
    addPopup(P.cx,P.fy-150,String(dot),'#c890ff');
    glow(P.cx,P.fy-64,90,'rgba(150,80,255,.6)',.8);
    tone(240,120,.2,'sawtooth',.12);
    updateStatus();
    await sleep(500);
    if(P.hp<=0){await gameOver();return;}
  }
  if(ts.skip){
    callout('FROZEN!','#8ce0ff');
    await say(P.name+' is locked in place!',900);clearMsg();
    updateStatus();
    await enemyPhase();
    return;
  }
  // Haste: grant a bonus action this turn
  P.extraAction=hasStatus(P,'haste')?1:0;
  updateStatus();
  rootMenu();
}

async function enemyPhase(opening){
  for(const e of enemies){
    if(e.hp<=0)continue;
    // status ticks (burn/poison DoT + doom, freeze/stun skip)
    const ts=tickStatus(e);
    let edot=ts.dot||0;
    if(ts.doom){const cc=enemyCenter(e);callout('DOOM!','#c088ff');edot+=ts.doom;burst(cc.x,cc.y,['#c088ff','#7030c0','#301050'],24,110,-10,.9);SFX.dark();}
    if(edot){
      e.hp=Math.max(0,e.hp-edot);const cc=enemyCenter(e);
      addPopup(cc.x,cc.y-24,String(edot),'#c890ff');e.flash=1;
      burst(cc.x,cc.y,['#b070f0','#7030c0'],8,60,20,.4);
      updateStatus();await sleep(360);
      if(e.hp<=0){await enemyPerish(e);continue;}
    }
    if(ts.skip){
      await say(e.name+' is frozen solid!',720);clearMsg();continue;
    }
    const silenced=hasStatus(e,'silence');
    // release a telegraphed charge from last turn
    if(e.charging){
      const move=e.charging;e.charging=null;
      await say(e.name+' unleashes '+move.n+'!',700);
      camPunch(1.12,P.cx,P.fy-70);flashScreen={c:'#ffffff',t:.4};
      for(let i=0;i<6;i++){e.ox=(i+1)*11;await sleep(16);}
      if(move.t==='phys'){SFX.slash();slashes.push({x:P.cx-16,y:P.fy-66,t:1});await damagePlayer(e.atkS*move.p*enemyDmgMult()*1.5,'phys');}
      else{await spellVFX(move.t,P.cx,P.fy-66);await damagePlayer(e.magS*move.p*enemyDmgMult()*1.5,move.t);}
      for(let i=6;i>0;i--){e.ox=i*11;await sleep(13);}e.ox=0;clearMsg();
      if(P.hp<=0){await gameOver();return;}
      await sleep(120);continue;
    }
    // caster behaviours are blocked by Silence
    if(!silenced){
    // heal_ally
    if(e.behavior&&e.behavior.includes('heal_ally')){
      const hurt=enemies.filter(x=>x.hp>0&&x!==e&&x.hp/x.maxhp<.55).sort((a,b)=>a.hp/a.maxhp-b.hp/b.maxhp)[0];
      if(hurt&&Math.random()<.7){
        await say(e.name+' chants a mending hymn!',620);
        const cc=enemyCenter(hurt);
        glow(cc.x,cc.y,90,'rgba(140,255,150,.7)',1);rise(cc.x,cc.y+10,['#c0ffb8','#7ce07a','#fff'],18);SFX.heal();
        const amt=Math.round(hurt.maxhp*.3);hurt.hp=Math.min(hurt.maxhp,hurt.hp+amt);hurt.flash=1;enemyReact(hurt,'heal');enemyReact(e,'happy');
        addPopup(cc.x,cc.y-24,'+'+amt,'#90ff90');
        await sleep(620);clearMsg();continue;
      }
    }
    // harden
    if(e.behavior&&e.behavior.includes('harden')&&!e.hardened&&Math.random()<.35){
      e.hardened=true;e.defS=Math.round(e.defS*1.8);
      await say(e.name+' hardens its shell!',620);
      const cc=enemyCenter(e);glow(cc.x,cc.y,80,'rgba(180,200,255,.6)',1);e.flash=1;
      await sleep(620);clearMsg();continue;
    }
    // heal_self
    if(e.behavior&&e.behavior.includes('heal_self')&&e.hp/e.maxhp<.45&&Math.random()<.6){
      await say(e.name+' drains the aether to mend itself!',680);
      const cc=enemyCenter(e);glow(cc.x,cc.y,100,'rgba(124,240,255,.7)',1);rise(cc.x,cc.y+10,['#bfeaff','#7cf0ff','#fff'],20);SFX.heal();
      const amt=Math.round(e.maxhp*.22);e.hp=Math.min(e.maxhp,e.hp+amt);e.flash=1;enemyReact(e,'heal');
      addPopup(cc.x,cc.y-24,'+'+amt,'#7cf0ff');
      await sleep(680);clearMsg();continue;
    }
    // bosses telegraph a big charge instead of attacking (interruptable)
    if(e.boss&&!e.charging&&Math.random()<.4){
      const heavy=e.atks.slice().sort((a,b)=>b.p-a.p)[0];
      e.charging=heavy;e.chargeInterrupt=Math.round(e.maxhp*.14);e.chargeStart=e.hp;
      await say(e.name+' is charging '+heavy.n+'!  Strike hard to interrupt!',1200);
      const cc=enemyCenter(e);glow(cc.x,cc.y,110,'rgba(255,120,40,.6)',1);
      burst(cc.x,cc.y,['#ff9048','#ffd070','#ff5828'],20,70,-20,.7);SFX.dark();e.flash=1;
      callout('CHARGING','#ff8858');
      await sleep(700);clearMsg();continue;
    }
    }else if(Math.random()<.5){
      // a silenced caster fumbles
      await say(e.name+' is silenced!',620);clearMsg();
    }
    // normal attack (with swift double-strike support)
    await enemyStrike(e);
    if(P.hp<=0){await gameOver();return;}
    if(e.swift&&e.hp>0&&P.hp>0){
      await say(e.name+' strikes again!',560);
      await enemyStrike(e);
      if(P.hp<=0){await gameOver();return;}
    }
    clearMsg();
    await sleep(120);
  }
  if(opening){await say('Now — strike back!',800);clearMsg();}
  maybeHazard();          // announce a hazard for next turn
  maybeSponsor();         // and occasionally drop a sponsor crate
  playerTurn();
}
async function enemyStrike(e){
  let pool=e.atks;
  if(hasStatus(e,'silence')){const phys=e.atks.filter(a=>a.t==='phys');if(phys.length)pool=phys;}
  const atk=pick(pool);
  await say(e.name+' — '+atk.n+'!',540);
  enemyReact(e,'windup');                                     // coil back, angry face
  for(let i=0;i<5;i++){e.ox=-6*(i+1)/5;await sleep(15);}
  await sleep(70);
  enemyReact(e,'strike');                                     // spring forward
  for(let i=0;i<6;i++){const t=1-Math.pow(1-(i+1)/6,2);e.ox=-6+(64)*t;e.oy=-Math.sin(t*Math.PI)*14;await sleep(13);}
  if(atk.fx)playAttackFX(atk.fx,atk.t);
  const rage=e.enraged?1.4:1;
  let dealt;
  if(atk.t==='phys'){
    SFX.slash();toon('slash',P.cx-14,P.fy-70,{col:'#ff8a8a',life:.35,rot:rnd(2.6,3.4),scale:1.05});
    dealt=e.atkS*atk.p*enemyDmgMult()*rage;await damagePlayer(dealt,'phys');
    // Riposte relic: chance to counter a melee blow
    if(P.relic==='counter'&&P.hp>0&&e.hp>0&&Math.random()<.3){
      await say(P.name+' counters!',600);
      const cc=enemyCenter(e);slashes.push({x:cc.x,y:cc.y,t:1});SFX.slash();
      await damageEnemy(e,pAtk()*.6+8,'phys');clearMsg();
    }
  }else{
    if(!atk.fx)await spellVFX(atk.t,P.cx,P.fy-66);
    dealt=e.magS*atk.p*enemyDmgMult()*rage;await damagePlayer(dealt,atk.t);
  }
  // status riders — from element and from any elite affix
  if(P.hp>0){
    if(atk.t==='fire'&&Math.random()<.28)applyStatus(P,'burn');
    else if(atk.t==='ice'&&Math.random()<.24)applyStatus(P,'freeze');
    else if(atk.t==='bolt'&&Math.random()<.18)applyStatus(P,'stun');
    else if(atk.t==='dark'&&Math.random()<.22)applyStatus(P,'poison');
    if(e.attackRider&&Math.random()<.4)applyStatus(P,e.attackRider);
    updateStatus();
  }
  if(e.behavior&&e.behavior.includes('lifesteal')&&e.hp>0){
    const drain=Math.round(dealt*.4);e.hp=Math.min(e.maxhp,e.hp+drain);
    const cc=enemyCenter(e);addPopup(cc.x,cc.y-24,'+'+drain,'#ff8ad0');e.flash=1;
  }
  for(let i=6;i>0;i--){e.ox=(64)*i/6;e.oy=0;await sleep(12);}
  e.ox=0;e.oy=0;
}

  const hpB=Math.round(hpPct*100)*2; lines.push(['HP remaining ('+Math.round(hpPct*100)+'%)','+'+hpB]);
  let flawless=0,itemfree=0,styleB=0,hcB=0,streakB=0;
  if(bstat.noHit){flawless=150;lines.push(['Flawless — no damage','+150']);}
  if(flawlessStreak>=2){streakB=flawlessStreak*60;lines.push(['Flawless streak ×'+flawlessStreak,'+'+streakB]);}
  if(bstat.items===0){itemfree=80;lines.push(['No items used','+80']);}
  if(battleMaxCombo>=3){styleB=battleMaxCombo*20;lines.push(['Style · combo ×'+battleMaxCombo,'+'+styleB]);}
  if(handicapCleared){hcB=140;lines.push(['Handicap defied','+140']);}
  const total=base+hpB+flawless+itemfree+styleB+hcB+streakB;
  // lifetime stats + achievements
  LT.battlesWon=(LT.battlesWon||0)+1;
  LT.bestCombo=Math.max(LT.bestCombo||0,battleMaxCombo);
  LT.maxRound=Math.max(LT.maxRound||0,round);
  if(round===GAUNTLET)LT.gauntlets=(LT.gauntlets||0)+1;
  saveLT();
  const newAch=checkAchievements();
  // attribute points: one per battle, more for the big ones
  const enc=encounterType();
  const gained=enc==='champion'?3:(enc==='boss'?2:(enc==='mini'?2:1));
  P.points=(P.points||0)+gained;
  lines.push(['Attribute points','+'+gained]);
  await showBPReceipt(lines,total);
  score+=total;updateStatus();
  for(const a of newAch){callout(a.name.toUpperCase(),'#ffd23a');SFX.fanfare();await sleep(900);}
  // ---- spend what you earned: this is where the build happens ----
  await levelUp();
  // ---- gauntlet milestone ----
  if(round===GAUNTLET){await gauntletClear();}
  // ---- the slot ----
  await showSlot();
}

// BACK pass: spotlights + the podium, and it carries the hero upward
function drawPodiumBack(g,dt){
  if(!podium)return;
  podium.t+=dt;
  podium.rise=Math.min(1,podium.rise+dt*.75);
  const e=1-Math.pow(1-podium.rise,3);          // ease-out rise
  const px=P.cx, baseY=P.fy, lift=e*96;
  podium.lift=lift;
  P.oy=-lift;                                    // the champion rides it up
  hypeCrowd(1);                                  // the crowd never stops
  // spotlights converging on the champion
  g.save();g.globalCompositeOperation='lighter';
  for(let i=0;i<3;i++){
    const a=(-.5+i*.5)+Math.sin(podium.t*.7+i)*.08;
    const tipx=px+Math.sin(a)*40;
    const gg=g.createLinearGradient(tipx,0,px,baseY-lift);
    gg.addColorStop(0,'rgba(255,240,190,.20)');gg.addColorStop(1,'rgba(255,240,190,0)');
    g.fillStyle=gg;

  }
  g.restore();
  // the podium itself, rising out of the deck
  const pw=132, ph=lift+22;
  g.save();
  _RR(g,px-pw/2,baseY-lift,pw,ph+16,10);
  const pg=g.createLinearGradient(px-pw/2,baseY-lift,px+pw/2,baseY);
  pg.addColorStop(0,'#6a4a96');pg.addColorStop(.5,'#8a63bd');pg.addColorStop(1,'#4a3070');
  g.fillStyle=pg;g.fill();
  g.strokeStyle=INK;g.lineWidth=5;g.lineJoin='round';g.stroke();
  // glowing top rim + a big gold "1"
  _RR(g,px-pw/2+6,baseY-lift+4,pw-12,10,5);
  g.fillStyle='#ffd23a';g.fill();g.strokeStyle=INK;g.lineWidth=3;g.stroke();
  if(lift>34){

    g.textAlign='center';g.textBaseline='middle';
    g.lineWidth=7;g.lineJoin='round';g.strokeStyle=INK;
    g.strokeText('1',px,baseY-lift/2+12);

function drawPodiumFront(g,dt){

   A scripted camera move with letterbox bars and on-screen titles.

let cine=null;   // {t, dur, skip, beats[]}
const CINE_BEATS=[
  {at:0.0, txt:'THE CRUCIBLE',           sub:'Sector 7 · Live Broadcast'},
  {at:2.2, txt:'EIGHT BATTLES',          sub:'No retreat. No mercy.'},
  {at:4.4, txt:null,                     sub:null},
];
function startCine(){
  cine={t:0,dur:6.2,skipped:false};
}
function cineCam(){
  // returns {zoom, fx, fy} — a slow crane across the arena, settling on the deck
  if(!cine)return null;
  const t=cine.t;
  // 0-2.2s : high and wide on the crowd, drifting right
  // 2.2-4.4s: pushing in toward the screens
  // 4.4-6.2s: craning down and settling on the combat deck
  let zoom,fx,fy;
  if(t<2.2){
    const p=t/2.2;
    zoom=1.55-p*.12;
    fx=W*(.28+p*.20);fy=H*.18;
  }else if(t<4.4){
    const p=(t-2.2)/2.2;
    zoom=1.43-p*.10;
    fx=W*(.48+p*.14);fy=H*(.18+p*.20);
  }else{
    const p=clamp((t-4.4)/1.8,0,1);
    const e=1-Math.pow(1-p,3);
    zoom=1.33-e*.33;                       // settle to 1.0
    fx=W*(.62-e*.12);fy=H*(.38+e*.30);
  }
  return{zoom,fx,fy};
}
function drawCine(g,dt){
  if(!cine)return;
  cine.t+=dt;
  const t=cine.t;
  // letterbox bars slide in, then out at the end
  const inP=clamp(t/.5,0,1);
  const outP=clamp((t-(cine.dur-.6))/.6,0,1);
  const barH=H*.11*(inP-outP*1);
  if(barH>0){
    g.save();g.fillStyle='#07040e';
    g.fillRect(0,0,W,barH);g.fillRect(0,H-barH,W,barH);
    g.strokeStyle='rgba(255,70,200,.35)';g.lineWidth=2;
    g.beginPath();g.moveTo(0,barH);g.lineTo(W,barH);
    g.moveTo(0,H-barH);g.lineTo(W,H-barH);g.stroke();
    g.restore();
  }
  // a live "ON AIR" tally in the corner
  if(t<cine.dur-.6&&barH>10){
    g.save();g.globalAlpha=.5+Math.abs(Math.sin(t*3))*.5;
    g.fillStyle='#ff3a4a';g.beginPath();g.arc(38,barH+22,6,0,7);g.fill();
    g.font='800 13px "Baloo 2",cursive';g.textAlign='left';g.textBaseline='middle';
    g.fillStyle='#fff';g.fillText('ON AIR',52,barH+22);
    g.restore();
  }
  // titles
  for(let i=0;i<CINE_BEATS.length;i++){
    const b=CINE_BEATS[i];if(!b.txt)continue;
    const next=CINE_BEATS[i+1]?CINE_BEATS[i+1].at:cine.dur;
    if(t<b.at||t>next)continue;
    const local=t-b.at, span=next-b.at;
    const a=clamp(local/.4,0,1)*clamp((span-local)/.5,0,1);
    if(a<=0)continue;
    g.save();g.globalAlpha=a;
    const slide=(1-clamp(local/.5,0,1))*26;
    g.textAlign='center';
    g.font='800 40px "Baloo 2",cursive';
    g.lineWidth=9;g.lineJoin='round';g.strokeStyle=INK;
    g.strokeText(b.txt,W/2+slide,H*.48);
    g.fillStyle='#ffd23a';g.fillText(b.txt,W/2+slide,H*.48);
    if(b.sub){
      g.font='800 17px "Baloo 2",cursive';
      g.lineWidth=6;g.strokeStyle=INK;
      g.strokeText(b.sub,W/2+slide,H*.56);
      g.fillStyle='#5cf0ff';g.fillText(b.sub,W/2+slide,H*.56);
    }
    g.restore();
  }
  // skip hint
  if(t>.8&&t<cine.dur-.6){
    g.save();g.globalAlpha=.45+Math.sin(t*3)*.15;
    g.font='800 13px "Baloo 2",cursive';g.textAlign='right';
    g.fillStyle='#cfc4e0';g.fillText('tap to skip',W-24,H-barH-16);
    g.restore();
  }
  if(t>=cine.dur)cine=null;
}

/* ============================ SLOT MACHINE ============================ */
const overlay=$('#overlay'),sheet=$('#sheet');
function hideOverlay(){overlay.classList.add('hidden');}
function showOverlay(){overlay.classList.remove('hidden');}
const REEL_SYMS=['sword','shield','book','heart','gem','orb','potion','frog','burst','skull','angry','coin','sparkle','swords'];
const MED_HC=['frog','bleed','silence','weaken','venom','sealed','doublecost','dazed'];
const HARD_HC=['fragile','fury','berserk','overload','venom'];
/* ---- (6) boon rarity: common / rare / epic / legendary, Forza-style ---- */
const RARITY={
  common:   {name:'COMMON',    col:'#b8c0d0', glow:'rgba(184,192,208,.55)', rank:0},
  rare:     {name:'RARE',      col:'#5cf0ff', glow:'rgba(92,240,255,.7)',   rank:1},
  epic:     {name:'EPIC',      col:'#c088ff', glow:'rgba(192,136,255,.8)',  rank:2},
  legendary:{name:'LEGENDARY', col:'#ffd23a', glow:'rgba(255,210,60,.95)',  rank:3},
};
// what a boon is actually worth decides how rare it reads
function boonRarity(b){
  const id=b.id||'';
  if(id.startsWith('relic:'))          return 'legendary';
  if(id==='wpn'||id==='arm')           return 'epic';
  if(id==='maxhp40')                   return 'epic';
  if(id.startsWith('spell:')){
    const sp=SPELLS[id.split(':')[1]];
    if(sp&&sp.mp>=20)                  return 'legendary';
    if(sp&&sp.mp>=13)                  return 'epic';
    return 'rare';
  }
  if(id==='maxhp'||id==='maxmp'||id==='atk'||id==='mag') return 'rare';
  if(id.startsWith('bp:')){
    const amt=+id.split(':')[1];
    return amt>=300?'rare':'common';
  }
  return 'common';
}
function rollWagers(){
  const jackpot=Math.random()<(0.08+Math.min(round,12)*0.008);
  const cards=[];
  cards.push({klass:'safe',head:'PLAY IT SAFE',hc:null,boon:makeBoon(1)});
  cards.push({klass:'gamble',head:'GAMBLE',hc:pick(MED_HC),boon:makeBoon(2)});
  if(jackpot)cards.push({klass:'jackpot',head:'7-7-7 JACKPOT',hc:null,boon:makeBoon(3),jp:200+round*40});
  else cards.push({klass:'wild',head:'HIGH ROLL',hc:pick(HARD_HC),boon:makeBoon(3)});
  for(const c of cards)c.rarity=boonRarity(c.boon);
  return cards;
}
/* ============================================================================
   THE REELS — a physical drum: it winds back, rips into a blurred spin,
   then decelerates with a long ease-out, overshoots the payline and springs
   back onto it. Every symbol that crosses the line ticks.
   ========================================================================== */
function buildReelStrip(reel,finalSym,spins,idx,tease){
  const strip=reel.querySelector('.strip');
  const reelH=reel.clientHeight||100;
  // cells are shorter than the window, so you catch the symbols above and below
  // rushing past — that is what sells it as a turning drum rather than a flicker
  const cellH=Math.max(28,Math.round(reelH*0.62));
  const total=spins+1;                       // the winning symbol is the last cell
  let html='';
  for(let i=0;i<total;i++){
    const last=(i===total-1);
    // on a tease the drum stalls one short — so make that cell a heartbreaker
    // (a blank/dud) so the near-miss actually reads as a near-miss
    const nearMiss=tease&&(i===total-2);
    let sym,col=null;
    if(last){sym=finalSym;col=(finalSym==='seven')?'#ffe25a':null;}
    else if(nearMiss){sym='cross';col='#8d84a0';}
    else sym=pick(REEL_SYMS);
    html+='<div class="cell" style="height:'+cellH+'px">'+ic(sym,42,col)+'</div>';
  }
  strip.innerHTML=html;
  // give the drum a small top pad so cell 0 starts centred on the payline
  strip.style.paddingTop=((reelH-cellH)/2)+'px';
  strip.style.transform='translateY(0px)';
  strip.style.filter='url(#reelblur'+idx+')';
  return{strip,cellH,total,reelH};
}
function spinReel(reel,finalSym,dur,idx,opts){
  opts=opts||{};
  return new Promise(res=>{
    const spins=24+ri(0,8);                  // several full revolutions
    const{strip,cellH,total}=buildReelStrip(reel,finalSym,spins,idx,opts.tease);
    // scroll so the LAST cell comes to rest exactly on the payline
    const D=(total-1)*cellH;
    const blurNode=document.getElementById('reelblurG'+idx);

    // --- (4) NEAR-MISS TEASE: the drum almost stops one symbol short of the
    //     prize, hangs there, then creeps the last notch home ---
    const tease=!!opts.tease;
    const TEASE_HOLD=900;                    // how long it agonisingly hangs
    const spinDur=tease?dur:dur;
    const NEAR=D-cellH;                      // one symbol short of the payline

    const WIND=180;                          // anticipation: the drum winds back first
    const BACK=cellH*0.42;
    const t0=performance.now();
    let lastCell=-1, prevY=0, teasedAt=0;

    function frame(now){
      const t=now-t0;
      let y;
      if(t<WIND){
        // --- wind-up: pull backwards, easing out ---
        const p=t/WIND;
        y=-BACK*(1-Math.pow(1-p,2));
      }else if(tease && t < WIND+spinDur+TEASE_HOLD){
        const tt=t-WIND;
        if(tt<spinDur){
          // spin down to ONE SYMBOL SHORT and stall there
          const p=clamp(tt/spinDur,0,1);
          const e=1-Math.pow(1-p,5);
          y=-BACK*(1-e)+NEAR*e;
          if(p>=1){y=NEAR;}
        }else{
          // the hang: it shudders, refusing to give up the prize
          const q=(tt-spinDur)/TEASE_HOLD;
          const shud=Math.sin(q*Math.PI*9)*cellH*0.035*Math.exp(-q*2.2);
          y=NEAR+shud;
          // then, right at the end, it creeps the final notch
          if(q>0.62){
            const c=(q-0.62)/0.38;
            const ce=1-Math.pow(1-c,3);
            y=NEAR+cellH*ce;
            if(!teasedAt){teasedAt=1;tone(220,120,.3,'sawtooth',.14);buzz([0,20,60,20]);}
          }
        }
      }else{
        const p=clamp((t-WIND)/spinDur,0,1);
        // --- rip away, then a long heavy ease-out (quint) into the payline ---
        const e=1-Math.pow(1-p,5);
        y=-BACK*(1-e)+D*e;                   // unwinds the wind-up as it accelerates
        // --- overshoot the line, then rock back onto it ---
        if(p>0.86){
          const q=(p-0.86)/0.14;
          const damp=Math.exp(-q*6.2);
          y+=Math.sin(q*Math.PI*2.3)*cellH*0.18*damp;
        }
        if(p>=1)y=D;
      }

      // --- speed drives the motion blur AND a subtle vertical stretch ---
      const vel=Math.abs(y-prevY);prevY=y;
      const stretch=1+clamp(vel*0.0035,0,0.10);
      strip.style.transform='translateY(-'+y.toFixed(2)+'px) scaleY('+stretch.toFixed(3)+')';
      if(blurNode){
        const blur=clamp(vel*0.30,0,11);     // vertical-only smear, like a real drum
        blurNode.setAttribute('stdDeviation','0 '+blur.toFixed(2));
      }

      // --- a tick each time a symbol crosses the payline; they slow and deepen ---
      const cellIdx=Math.floor(y/cellH);
      if(cellIdx!==lastCell&&t>WIND){
        lastCell=cellIdx;
        const pitch=780+clamp(vel,0,42)*20;
        tone(pitch,pitch,.012,'square',clamp(.018+vel*.0022,.018,.07));
      }

      const total_t=WIND+spinDur+(tease?TEASE_HOLD:0);
      if(t<total_t)requestAnimationFrame(frame);
      else{
        strip.style.transform='translateY(-'+D.toFixed(2)+'px) scaleY(1)';
        if(blurNode)blurNode.setAttribute('stdDeviation','0 0');
        reel.classList.add('locked','pop');
        setTimeout(()=>reel.classList.remove('pop'),320);
        tone(300,150,.16,'square',.20);      // the clunk of the drum locking home
        tone(140,90,.22,'triangle',.14);
        buzz(22);
        res();
      }
    }
    requestAnimationFrame(frame);
  });
}
async function showSlot(){
  gameState='slot';

async function runSlot(wagers,rerollLeft){
  const jackpot=wagers[2].klass==='jackpot';
  const reelHTML='<div class="reel"><div class="strip"></div><div class="payline"></div></div>';
  // one vertical-blur filter per drum, driven live from the spin's velocity
  const filters='<svg width="0" height="0" style="position:absolute"><defs>'+
    [0,1,2].map(i=>'<filter id="reelblur'+i+'" x="-20%" y="-20%" width="140%" height="140%">'+
      '<feGaussianBlur id="reelblurG'+i+'" stdDeviation="0 0"/></filter>').join('')+
    '</defs></svg>';
  sheet.innerHTML=
    '<div class="slot-title">HANDICAP REELS</div>'+
    '<div class="subtitle" style="font-size:clamp(11px,1.9vmin,15px);margin-bottom:0">The reels deal the hand — you choose how to play it</div>'+
    filters+
    '<div class="reels" id="reels">'+reelHTML+reelHTML+reelHTML+'</div>'+
    '<div class="wagers" id="wagers"></div>'+
    (rerollLeft>0?'<button class="mbtn" id="reroll" style="min-width:38%;padding:1% 3%;font-size:clamp(12px,2.2vmin,17px)">'+ic('reroll',15)+' Re-spin ('+rerollLeft+')</button>':'');
  showOverlay();
  const reels=[...sheet.querySelectorAll('.reel')];
  const finals=jackpot?['seven','seven','seven']
    :[wagers[0].boon.icon,(wagers[1].hc?HANDICAPS[wagers[1].hc].icon:'coin'),wagers[2].boon.icon];
  // the lever: a rising whirr as all three drums tear away together
  SFX.ok();
  tone(180,760,.5,'sawtooth',.10);

  // --- reels one and two stop first ---
  await Promise.all([
    spinReel(reels[0],finals[0],1500,0),
    spinReel(reels[1],finals[1],2200,1),
  ]);

  // --- (5) ANTICIPATION: two 7s showing means the third could pay out.
  //     The cabinet goes gold, the music drops to a held drone, and the last
  //     drum grinds on far longer than it should. ---
  const twoSevens=(finals[0]==='seven'&&finals[1]==='seven');
  let lastDur=3100-2200+900;      // its normal remaining spin
  if(twoSevens){
    $('#reels').classList.add('anticipate');
    reels[2].classList.add('anticipate');
    stopMusic();
    tone(110,110,2.6,'sawtooth',.09);     // the held, nerve-shredding drone
    tone(165,165,2.6,'triangle',.05);
    callout('TWO SEVENS…','#ffe25a');
    buzz([0,25,120,25,120,25]);
    lastDur=3400;                          // it drags it out
  }

  // --- (4) a near-miss tease: sometimes it stalls one symbol short ---
  const tease=twoSevens ? true : (!jackpot && Math.random()<0.22);
  await spinReel(reels[2],finals[2],lastDur,2,{tease});

  $('#reels').classList.remove('anticipate');
  reels[2].classList.remove('anticipate');

  if(jackpot){
    $('#reels').classList.add('jackpot');
    SFX.fanfare();callout('JACKPOT','#ffe25a');buzz([0,60,70,60,70,110]);
  }else{
    if(twoSevens){callout('SO CLOSE','#9aa2b8');tone(200,90,.5,'sawtooth',.12);}
    SFX.powerup();
  }
  if(!muted)startMusic(musicTheme||'title');
  revealWagers(wagers);
  if(rerollLeft>0){const rb=$('#reroll');if(rb)rb.addEventListener('click',()=>{SFX.ok();runSlot(rollWagers(),rerollLeft-1);});}
}
function revealWagers(wagers){
  const box=$('#wagers');box.innerHTML='';
  wagers.forEach((w,idx)=>{
    const b=document.createElement('button');
    const R=RARITY[w.rarity]||RARITY.common;
    b.className='wager '+w.klass+' rar-'+w.rarity;
    b.style.setProperty('--rc',R.col);
    b.style.setProperty('--rg',R.glow);
    b.style.animationDelay=(idx*0.16)+'s';
    const hc=w.hc?HANDICAPS[w.hc]:null;
    const costHTML=hc
      ? '<div class="wcost"><span class="wico">'+ic(hc.icon,26)+'</span><span>Next battle:<br><span class="wname" style="color:#ffb0b0">'+hc.name+'</span> — '+hc.desc+'</span></div>'
      : '<div class="wgain"><span class="wico">'+ic('check',26)+'</span><span>No handicap<br><span style="color:#9aa2b8">a clean fight</span></span></div>';
    const jpHTML=w.jp?'<div class="wgain" style="margin-top:5%"><span class="wico">'+ic('coin',26)+'</span><span><span class="wname" style="color:#ffe25a">+'+w.jp+' BP</span></span></div>':'';
    b.innerHTML='<div class="whead">'+w.head+'</div>'+
      '<div class="rarity">'+R.name+'</div>'+
      '<div class="wbody">'+
      costHTML+'<div class="wsep"></div>'+
      '<div class="wgain"><span class="wico">'+ic(w.boon.icon,26)+'</span><span><span class="wname">'+w.boon.name+'</span><br>'+w.boon.desc+'</span></div>'+
      jpHTML+'</div>';
    setTimeout(()=>{
      const rk=R.rank;
      tone(420+rk*140,620+rk*220,.18,'triangle',.10+rk*.03);
      if(rk>=2){tone(880+rk*160,1200,.22,'sine',.08);buzz(rk>=3?[0,30,40,50]:20);}
      if(rk>=3)SFX.fanfare();
    },idx*160);
    b.addEventListener('mouseenter',()=>SFX.move());
    b.addEventListener('click',()=>{
      SFX.powerup();
      applyBoon(w.boon.id);
      if(w.jp)score+=w.jp;
      pendingHandicap=w.hc;
      handicapCleared=!!w.hc; // if you accept a curse, clearing next battle pays out
      updateStatus();hideOverlay();startRound();
    });
    box.appendChild(b);
    setTimeout(()=>b.classList.add('in'),120+idx*140);
  });
}

/* ============================ SCORES / STORAGE ============================ */
const SCORE_KEY='endlessSaga.battleSquare.highscores';
let memScores=[];
function loadScores(){
  try{const r=localStorage.getItem(SCORE_KEY);memScores=r?JSON.parse(r):[];}
  catch(e){/* private-mode or disabled storage */}
  return memScores;
}
function saveScore(entry){
  let scores=loadScores();
  scores.push(entry);
  scores.sort((a,b)=>b.score-a.score);
  scores=scores.slice(0,10);
  memScores=scores;
  try{localStorage.setItem(SCORE_KEY,JSON.stringify(scores));}catch(e){}
  return scores;
}

const SHOP_KEY='endlessSaga.battleSquare.shop';
let SHOP={bank:0,owned:{}};
(function(){try{const r=localStorage.getItem(SHOP_KEY);if(r)Object.assign(SHOP,JSON.parse(r));}catch(e){}})();
function saveShop(){try{localStorage.setItem(SHOP_KEY,JSON.stringify(SHOP));}catch(e){}}
const SHOP_ITEMS=[
 {id:'hp',icon:'heart',name:'Hearty',desc:'Start with +3 VIGOR',cost:700},
 {id:'end',icon:'shield',name:'Hardened',desc:'Start with +3 ENDURANCE',cost:700},
 {id:'atk',icon:'sword',name:'Trained',desc:'Start with +3 STRENGTH',cost:900},
 {id:'crit',icon:'swords',name:'Nimble',desc:'Start with +3 DEXTERITY',cost:900},
 {id:'mag',icon:'orb',name:'Studied',desc:'Start with +3 INTELLIGENCE',cost:900},
 {id:'fth',icon:'star',name:'Devout',desc:'Start with +3 FAITH',cost:900},
 {id:'mp',icon:'gem',name:'Attuned',desc:'Start with +3 ATTUNEMENT',cost:700},
 {id:'spell',icon:'book',name:'Apprentice',desc:'Begin knowing Fire & Cure',cost:1100},
 {id:'points',icon:'sparkle',name:'Prodigy',desc:'Begin with 3 free attribute points',cost:1600},
 {id:'headstart',icon:'bolt',name:'Adrenaline',desc:'Begin every run with 30% Limit',cost:1400},

function applyShopToPlayer(){
  const o=SHOP.owned;
  if(o.hp)P.stats.vig+=3;
  if(o.mp)P.stats.atn+=3;
  if(o.atk)P.stats.str+=3;
  if(o.mag)P.stats.int+=3;
  if(o.end)P.stats.end+=3;
  if(o.fth)P.stats.fth+=3;
  if(o.crit)P.stats.dex+=3;
  if(o.spell){P.spells.push('fire');P.spells.push('cure');}   // a starting gift
  if(o.points)P.points=(P.points||0)+3;
  if(o.headstart)P.limit=30;
  if(o.revive)P.revive=true;
  recalcStats();
  P.hp=P.maxhp;P.mp=P.maxmp;
}
function openShop(){
  const cards=SHOP_ITEMS.map(it=>{
    const owned=!!SHOP.owned[it.id];
    const afford=SHOP.bank>=it.cost;
    const cls='card'+(owned?' ':'' );
    const btn=owned?'<span style="color:#7ce07a">OWNED</span>'
      :'<button class="tog'+(afford?'':'')+'" data-id="'+it.id+'" '+(afford?'':'disabled style="opacity:.4"')+'>'+it.cost+' BP</button>';
    return '<div class="card" style="cursor:default"><span class="cicon">'+ic(it.icon,30)+'</span>'+
      '<span class="cname">'+it.name+'</span>'+it.desc+'<div style="margin-top:8%">'+btn+'</div></div>';
  });
  // three per row via flex wrap
  sheet.innerHTML='<div class="slot-title" style="font-size:clamp(16px,3.6vmin,28px)">BP EMPORIUM</div><hr class="rule">'+
    '<div class="subtitle" style="font-size:clamp(12px,2vmin,16px)">Banked: <b style="color:#ffe25a">'+SHOP.bank+' BP</b> — permanent upgrades for every future run</div>'+
    '<div class="cards" style="flex-wrap:wrap;gap:1.6%">'+cards.join('')+'</div>'+
    '<button class="mbtn" id="shopBack">‹ Back</button>';
  sheet.querySelectorAll('button[data-id]').forEach(b=>b.addEventListener('click',()=>{
    const it=SHOP_ITEMS.find(x=>x.id===b.dataset.id);
    if(SHOP.owned[it.id]||SHOP.bank<it.cost){SFX.err();return;}
    SHOP.bank-=it.cost;SHOP.owned[it.id]=true;saveShop();SFX.powerup();openShop();
  }));
  $('#shopBack').addEventListener('click',()=>{SFX.back();showTitle();});
  showOverlay();
}

function startGame(charIdx){

  handicap=null;pendingHandicap=null;handicapCleared=false;
  P.limit=0;P.revive=false;P.relic=null;flawlessStreak=0;
  applyShopToPlayer();
  LT.runs=(LT.runs||0)+1;saveLT();
  combo=0;battleMaxCombo=0;runMaxCombo=0;
  stats={rounds:0,dmgDealt:0,dmgTaken:0,turns:0,spells:0,weakHits:0};
  particles=[];popups=[];slashes=[];boltsV=[];ambient=[];toons=[];bubble=null;
  hazard=null;crate=null;crowdHype=0;
  hideOverlay();
  $('#cmdwin').style.visibility='visible';
  $('#statwin').style.visibility='visible';

async function gameOver(){
  // Second Life: revive once per run instead of dying
  if(P&&P.revive){
    P.revive=false;P.pose=null;
    P.hp=Math.round(P.maxhp*.35);P.st={};
    callout('SECOND LIFE','#7ce07a');
    flashScreen={c:'#c0ffd0',t:.5};SFX.fanfare();
    const hc=heroCenter();glow(hc.x,hc.y,150,'rgba(140,255,150,.9)',1);
    burst(hc.x,hc.y,['#c0ffb8','#7ce07a','#fff'],30,120,-30,.9);
    await say(P.name+' refuses to fall!',1400);clearMsg();
    updateStatus();
    playerTurn();
    return;
  }
  gameState='gameover';
  clearMenu();
  stopMusic();
  if(P)P.pose='dead';
  paused=false;closeModal();
  $('#pausebtn').classList.add('hidden');
  $('#hcbadge').classList.add('hidden');
  $('#bossbar').classList.add('hidden');
  $('#hud').classList.add('hidden');
  SFX.gameover();
  burst(P.cx,P.fy-66,['#ff6048','#902020','#ffffff'],36,140,120,1.1);
  await say(P.name+' has fallen…',1600);
  clearMsg();
  // bank the run's Battle Points for the Emporium
  SHOP.bank+=score;saveShop();
  LT.deaths=(LT.deaths||0)+1;LT.bestBP=Math.max(LT.bestBP||0,score);LT.totalBP=(LT.totalBP||0)+score;LT.maxRound=Math.max(LT.maxRound||0,round-1);saveLT();checkAchievements();
  const entry={score,rounds:round-1,date:new Date().toLocaleDateString()};
  const scores=await saveScore(entry);
  const rank=scores.findIndex(s=>s===entry)+1;
  const cleared=round-1>=GAUNTLET;
  sheet.innerHTML=
   '<img class="portrait dead" src="'+heroPortrait(chosenChar,P.arm,P.wpn,130)+'" alt="">'+
   '<div class="pname-lbl">'+(CHARACTERS[chosenChar]||CHARACTERS[0]).name.toUpperCase()+'</div>'+
   '<div class="title-big" style="font-size:clamp(18px,4.6vmin,38px);background:linear-gradient(180deg,#ffb0a0,#e05840 55%,#6a1c14);-webkit-background-clip:text;background-clip:text;">'+(cleared?'THE CROWD FALLS SILENT':'DEFEATED')+'</div>'+
   '<hr class="rule">'+
   '<div class="sumrow"><span>Battles won</span><b>'+(round-1)+(cleared?' '+ic('star',12):'')+'</b></div>'+

   '<div class="sumrow"><span>Damage dealt</span><b>'+stats.dmgDealt+'</b></div>'+
   '<div class="sumrow"><span>Weakness strikes</span><b>'+(stats.weakHits||0)+'</b></div>'+
   '<div class="sumrow" style="border-top:1px solid rgba(255,70,200,.4);padding-top:1.2%"><span style="color:#ffe25a">BATTLE POINTS</span><b style="color:#ffe25a">'+score+'</b></div>'+
   '<div class="sumrow"><span>Banked total</span><b style="color:#ffe25a">'+SHOP.bank+' BP</b></div>'+
   (rank>0?'<div class="subtitle" style="margin-top:1%">'+(rank===1?'NEW CHAMPION — Rank I':'Hall of Champions — rank '+rank)+'</div>':'')+
   '<button class="mbtn" id="bAgain">Fight Again</button>'+
   '<button class="mbtn" id="bShop2">BP Emporium</button>'+
   '<button class="mbtn" id="bTitle">Title Screen</button>';
